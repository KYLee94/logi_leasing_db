  if (key.includes("asset") || label.indexOf("자산 수") > -1) return firstDefinedNumber_(safeGet_(context, ["profile", "assetCount"]), safeGet_(context, ["leasedAssets", "length"]));
  if ((key.includes("lease") && key.includes("area")) || label.indexOf("임대면적") > -1) return context.totalLeasedArea;
  if ((key.includes("rent") && !key.includes("average")) || label.indexOf("월 임대료") > -1) return firstDefinedNumber_(safeGet_(context, ["profile", "monthlyRentTotal"]));
  if (key.includes("mf") || label.indexOf("월 관리비") > -1) return firstDefinedNumber_(safeGet_(context, ["profile", "monthlyMfTotal"]));
  if (key.includes("monthly") || key.includes("cost") || label.indexOf("임관리비") > -1) return context.totalMonthlyCost;
  if (key.includes("expiry") || label.indexOf("만기") > -1) return firstNonEmptyValue_(safeGet_(context, ["profile", "latestExpiry"]));
  return item.value;
}

function resolveAssetKpiValue_(item, context) {
  if (hasValue_(item && item.value)) return item.value;
  const key = String(safeGet_(item, ["key"]) || "").toLowerCase();
  const label = String(safeGet_(item, ["label"]) || "");
  if (key.includes("tenant") || label.indexOf("임차인 수") > -1) return safeGet_(context, ["rows", "length"]);
  if (key.includes("occupancy") || label.indexOf("임대율") > -1) return safeDivideClient_(safeGet_(context, ["summary", "leasedAreaSqm"]), safeGet_(context, ["summary", "grossFloorAreaSqm"]));
  if ((key.includes("lease") && key.includes("area")) || label.indexOf("임대면적") > -1) return context.totalLeasedArea;
  if (key.includes("vacancy") && key.includes("area")) return firstDefinedNumber_(safeGet_(context, ["breakdown", "vacancyAreaSqm"]), safeGet_(context, ["summary", "vacancyAreaSqm"]));
  if (key.includes("vacancy") || label.indexOf("공실률") > -1) return firstDefinedNumber_(safeGet_(context, ["breakdown", "vacancyRate"]), safeGet_(context, ["summary", "vacancyRate"]));
  if (key.includes("e_noc") || key.includes("enoc") || label.indexOf("E.NOC") > -1) {
    return firstDefinedNumber_(safeGet_(context, ["summary", "averageENoc"]), safeGet_(context, ["averageENocValue"]), averageBy_(safeGet_(context, ["rows"]) || [], "eNoc"));
  }
  if (key.includes("expiry") || label.indexOf("만기") > -1) return firstNonEmptyValue_(safeGet_(context, ["summary", "latestExpiry"]), safeGet_(context, ["expiryRows", 0, "currentEndDate"]));
  if (key.includes("monthly") || key.includes("rent") || key.includes("cost") || label.indexOf("임관리비") > -1 || label.indexOf("임대료") > -1) return context.totalMonthlyCost;
  return item.value;
}

function formatMetricValue_(value, valueType) {
  if (valueType === "currency") return formatCurrency_(value);
  if (valueType === "percent") return formatPercent_(value);
  if (valueType === "area") {
    const areaText = formatArea_(value);
    const pyText = formatPy_(value);
    return areaText === "-" ? "-" : `${areaText} <span style="font-size:0.76rem;color:var(--text-muted);">${pyText}</span>`;
  }
  if (valueType === "py") return formatPy_(value);
  if (valueType === "date") return formatDateCell_(value);
  return formatNumber_(value);
}

function formatDynamicMetric_(metric, value) {
  if (metric === "leasedAreaSqm") return formatArea_(value);
  if (metric === "currentMonthlyRentTotal" || metric === "currentMonthlyMfTotal" || metric === "monthlyCostTotal" || metric === "eNoc") return formatCurrency_(value);
  return formatNumber_(value);
}

function formatNumber_(value) {
  if (value == null || value === "") return "-";
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return escapeHtml_(String(value));
  return numeric.toLocaleString("ko-KR", { maximumFractionDigits: numeric % 1 === 0 ? 0 : 2 });
}

function formatCurrency_(value) {
  if (value == null || value === "") return "-";
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return "-";
  return numeric.toLocaleString("ko-KR") + "원";
}

function formatPercent_(value) {
  if (value == null || value === "") return "-";
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return "-";
  return (numeric * 100).toFixed(1).replace(/\.0$/, "") + "%";
}

function formatArea_(value) {
  if (value == null || value === "") return "-";
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return "-";
  return numeric.toLocaleString("ko-KR", { maximumFractionDigits: 2 }) + "㎡";
}

function formatPy_(value) {
  if (value == null || value === "") return "-";
  const numeric = Number(value);
  if (!Number.isFinite(numeric)) return "-";
  return (numeric / 3.305785).toLocaleString("ko-KR", { maximumFractionDigits: 2 }) + "평";
}

function formatDateCell_(value) {
  if (!value) return "-";
  return escapeHtml_(String(value));
}

function formatDateTime_(value) {
  if (!value) return "-";
  return String(value).replace("T", " ").replace(".000Z", "");
}

function safeGet_(value, path) {
  return (path || []).reduce((accumulator, key) => (accumulator == null ? null : accumulator[key]), value);
}

function escapeHtml_(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function floorSortKey_(label) {
  const text = String(label || "");
  if (/^B\d+/i.test(text)) return -Number(text.replace(/[^0-9]/g, ""));
  const numeric = Number(text.replace(/[^0-9.-]/g, ""));
  return Number.isFinite(numeric) ? numeric : -999;
}
function getActivePayloadForBasisOverride_() {

function humanizeBasisSourceOverride_(source) {

function resolveBasisAsOfTextOverride_(asOf, source) {
  if (asOf && typeof asOf === "object") {
    return firstNonEmptyValue_(asOf.asOfText, asOf.asOf, asOf.generatedAt) || "-";
  }
  const raw = String(asOf == null ? "" : asOf).trim();
  const payload = getActivePayloadForBasisOverride_();
  const generatedAt = firstNonEmptyValue_(
    safeGet_(payload, ["generatedAt"]),
    safeGet_(payload, ["meta", "generatedAt"]),
    safeGet_(state, ["bootstrap", "generatedAt"])
  );
  const latestMonth = detectLatestPayloadMonthOverride_(payload);
  const normalizedSource = String(source || "");

  if (raw === "월별 누적") {
    return latestMonth ? `최신 반영월 ${latestMonth}` : (generatedAt ? `데이터 리프레시 ${formatDateTime_(generatedAt)}` : raw);
  }

  if (normalizedSource.indexOf("OpenDART") > -1 || normalizedSource.indexOf("DB_기업") > -1) {
    const dartAsOf = detectDartBasisAsOfTextOverride_(payload);
    if (dartAsOf && (raw === "현재 계약 기준" || raw === "현재 시점" || raw === "최근 공시 기준" || raw === "최신 기준월")) {
      return dartAsOf;
    }
  }

  if (raw === "현재 계약 기준" || raw === "현재 시점" || raw === "최신 기준월" || raw === "최근 공시 기준" || raw === "현재 기준") {
    return generatedAt ? `데이터 리프레시 ${formatDateTime_(generatedAt)}` : raw;
  }

  return raw || (generatedAt ? `데이터 리프레시 ${formatDateTime_(generatedAt)}` : "-");
}

function renderBasisLine_(asOf, scope, unit, source) {
  const asOfText = resolveBasisAsOfTextOverride_(asOf, source);
  const scopeText = asOf && typeof asOf === "object" ? firstNonEmptyValue_(asOf.scopeText, scope) : scope;
  const unitText = asOf && typeof asOf === "object" ? firstNonEmptyValue_(asOf.unitText, unit) : unit;
  const sourceText = humanizeBasisSourceOverride_(asOf && typeof asOf === "object" ? firstNonEmptyValue_(asOf.sourceText, source) : source);

}

      <div class="content-grid-two">

            </div>
          </div>
          ${renderKeyValueGrid_([
            ["권한 상태", escapeHtml_(authStatus)],
            ["권한 링크", authUrl ? `<a href="${escapeHtml_(authUrl)}" target="_blank" rel="noreferrer">권한 승인 열기</a>` : "없음"],
            ["OpenDART 준비", openDart.ready ? "사용 가능" : "확인 필요"],
            ["OpenDART 대기 기업", formatNumber_(openDart.pendingCompanies)],
            ["OpenDART 최근 성공", openDart.lastSuccessAt || "-"],
            ["OpenDART 최근 실패", openDart.lastFailureAt || "-"],
            ["OpenDART 실패 메시지", openDart.lastFailureMessage || "-"],
            ["건축물대장 준비", buildingHub.ready ? "사용 가능" : "확인 필요"],
            ["건축물대장 대기 자산", formatNumber_(buildingHub.pendingAssets)],
            ["건축물대장 최근 성공", buildingHub.lastSuccessAt || "-"],
            ["건축물대장 최근 실패", buildingHub.lastFailureAt || "-"],
            ["건축물대장 실패 메시지", buildingHub.lastFailureMessage || "-"],
            ["네이버 지도 준비", naverMaps.ready ? "사용 가능" : "확인 필요"],
            ["Dynamic Client ID", naverMaps.dynamicClientIdConfigured ? "설정됨" : "미설정"],
            ["Static Key ID", naverMaps.staticKeyIdConfigured ? "설정됨" : "미설정"],
            ["NCP 허용 도메인 힌트", (naverMaps.allowedOriginHints || []).join(", ") || "-"],
            ["QA 사용 경로", routes.qaUser ? `<code>${escapeHtml_(routes.qaUser)}</code>` : "-"],
            ["정적 스냅샷", snapshotStatus],
            ["스냅샷 레코드/청크", `${formatNumber_(snapshotState.recordCount)} / ${formatNumber_(snapshotState.chunkCount)}`],
            ["스냅샷 오류", formatNumber_(snapshotState.errorCount)],
            ["스냅샷 트리거", hasSnapshotTrigger ? "설치됨" : "미설치"],
            ["설정된 스냅샷 시각", `${formatNumber_(snapshotState.refreshHour || 9)}시`],
            ["계산 갱신 작업", [safeGet_(jobStates, ["refresh", "status"]) || "-", safeGet_(jobStates, ["refresh", "message"]) || "-"].join(" / ")],
            ["스냅샷 작업", [safeGet_(jobStates, ["snapshot", "status"]) || "-", safeGet_(jobStates, ["snapshot", "message"]) || "-"].join(" / ")],
            ["OpenDART 작업", [safeGet_(jobStates, ["openDart", "status"]) || "-", safeGet_(jobStates, ["openDart", "message"]) || "-"].join(" / ")],

          ])}
        </section>

        <section class="workspace-panel">
          <div class="section-header">
            <div class="section-heading-copy">
              <h3 class="section-title">정합성 요약</h3>
              <p class="section-subtitle">화면 숫자와 DB 기준 비교 상태를 요약합니다.</p>
              ${renderBasisLine_("현재 시점", "UI-DB 정합성", "건", "summary payload")}
            </div>
          </div>
          ${renderKeyValueGrid_([
            ["상태", reconciliation.status || "-"],
            ["정상", formatNumber_(reconciliation.okCount || reconciliation.pass || 0)],
            ["검토 필요", formatNumber_(reconciliation.reviewCount || reconciliation.review || 0)],
            ["오류", formatNumber_(reconciliation.errorCount || reconciliation.error || 0)],
            ["마지막 실행", reconciliation.generatedAt || reconciliation.updatedAt || "-"],
          ])}
          <div class="page-note">세부 검증이 필요하면 상단의 UI-DB 정합성 검증 버튼을 실행하세요.</div>
        </section>
      </div>
    </div>
  `;

  view.querySelectorAll("[data-admin-action]").forEach((button) => {
    button.addEventListener("click", () => {
      const fn = button.getAttribute("data-admin-action");
      const label = button.textContent.trim();
      const action = adminActions.find((item) => item[0] === fn);
      const timeoutMs = action ? action[2] : 45000;
      showLoading(true, `${label} 작업을 실행하고 있습니다.`, "완료 후 관리자 화면을 다시 불러옵니다.");
      callServer_(fn, buildAdminRequest_(), { timeoutMs })
        .then(() => {
          clearAllClientCaches_();
          return loadTabData_("admin", { force: true, overlay: false, allowStaleFallback: false });
        })
        .catch((error) => {
          openMetricModal_("관리자 실행 오류", renderStateShell_("관리자 작업 실행에 실패했습니다.", (error && error.message) || String(error)), renderBasisLine_("현재 시점", label, "오류", "Apps Script"));
        })
        .finally(() => showLoading(false));
    });
  });
  view.querySelectorAll(".admin-metric-button").forEach((button) => {
    const action = button.getAttribute("data-action") || "";
    if (action.indexOf("admin-review:") === 0) {
      const key = action.split(":")[1];
      const item = reviewMetrics.find((row) => row.key === key);
      button.onclick = () => {
        const rows = safeGet_(safeAdmin, ["reviewDetails", key]) || [];
        if (rows.length) {
          renderAdminReviewDetailModal_(`${item ? item.label : key} 상세`, rows, renderBasisLine_("현재 시점", `${item ? item.label : key} 상세`, "건", "admin payload lightweight details"));
          return;
        }
        loadAdminReviewDetailModal_(key, `${item ? item.label : key} 상세`);
      };
      return;
    }
    if (action === "admin-open-dart") {
      button.onclick = () => loadAdminBacklogDetailModal_("openDart", "OpenDART 미연결 기업", "company");
      return;
    }
    if (action === "admin-building-hub") {
      button.onclick = () => loadAdminBacklogDetailModal_("building", "건축물대장 미연결 자산", "asset");
      return;
    }
    if (action === "admin-issue-backlog") {
      button.onclick = () => loadAdminBacklogDetailModal_("issueBacklog", "이슈 백로그", "issue");
      return;
    }
    if (action === "admin-audit-preview") {
      button.onclick = () => loadAdminBacklogDetailModal_("audit", "정적 스냅샷 오류", "audit");
    }
  });
}
</script>
