<script>
const RAW_APP_FLAGS = window.APP_FLAGS || {};
const RUNTIME_CLIENT_CONFIG = (() => {
  const raw = window.RUNTIME_CLIENT_CONFIG;
  if (raw && typeof raw === "object") return raw;
  if (typeof raw === "string") {
    try {
      return JSON.parse(raw);
    } catch (error) {
      return {};
    }
  }
  return {};
})();

function normalizeFlagString_(value) {
  const text = String(value == null ? "" : value).trim();
  if (text.length >= 2 && text[0] === '"' && text[text.length - 1] === '"') {
    return text.slice(1, -1);
  }
  return text;
}

function normalizeBooleanFlag_(value) {
  if (typeof value === "boolean") return value;
  const text = normalizeFlagString_(value).toLowerCase();
  return text === "true" || text === "1" || text === "yes";
}

const APP_FLAGS = {
  isAdmin: normalizeBooleanFlag_(RAW_APP_FLAGS.isAdmin),
  viewerEmail: normalizeFlagString_(RAW_APP_FLAGS.viewerEmail),
  initialPage: normalizeFlagString_(RAW_APP_FLAGS.initialPage) || "home",
  adminSessionToken: normalizeFlagString_(RAW_APP_FLAGS.adminSessionToken),
  adminAuthRequired: normalizeBooleanFlag_(RAW_APP_FLAGS.adminAuthRequired),
};

window.APP_FLAGS = APP_FLAGS;

function getPublicSnapshotBaseUrl_() {
  return normalizeFlagString_(RUNTIME_CLIENT_CONFIG.publicSnapshotBaseUrl || "");
}

function canUsePublicSnapshots_() {
  return !IS_ADMIN && !!getPublicSnapshotBaseUrl_();
}

const IS_ADMIN = APP_FLAGS.isAdmin;
const TAB_ORDER = ["home", "asset", "company", "sector", "tools", "playground"].concat(IS_ADMIN ? ["admin"] : []);
const PAGE_META = {
  home: {
    kicker: "포트폴리오 모니터",
    title: "홈",
    subtitle: "포트폴리오 전체 임대 현황과 핵심 숫자를 빠르게 읽는 운영 화면입니다.",
  },
  asset: {
    kicker: "자산 워크스페이스",
    title: "자산",
    subtitle: "선택 자산의 임차 현황, 층별 점유, 면적 구조를 압축해서 보여드립니다.",
  },
  company: {
    kicker: "임차인 프로필",
    title: "기업",
    subtitle: "기업 기본 정보와 포트폴리오 내 임차 노출을 함께 확인하는 화면입니다.",
  },
  sector: {
    kicker: "권역 비교",
    title: "섹터",
    subtitle: "자산 랭킹, 공실률, 임관리비, 만기 집중도를 비교하는 화면입니다.",
  },
  tools: {
    kicker: "비교 분석",
    title: "분석 도구",
    subtitle: "기준 자산과 비교 자산을 놓고 차이, 벤치마크, 원장을 함께 보는 비교 작업공간입니다.",
  },
  playground: {
    kicker: "직접 집계",
    title: "데이터 분석",
    subtitle: "필터, 그룹핑, 피벗 관점으로 데이터를 탐색하는 비즈니스 친화형 분석 공간입니다.",
  },
  admin: {
    kicker: "Data Governance",
    title: "Admin",
    subtitle: "검토 필요 항목, 연동 실패, 감사 결과를 확인하고 동기화를 실행하는 관리자 화면입니다.",
  },
};

const state = {
  activeTab: resolveInitialTab_(APP_FLAGS.initialPage),
  bootstrap: buildFallbackBootstrap_(),
  pageCache: {},
  lastSuccessfulPayloads: {},
  charts: {},
  chartReady: null,
  sidebarCollapsed: false,
  aiContext: null,
  loadingCount: 0,
  themePreference: "system",
  resolvedTheme: "light",
  searchCatalog: {
    assets: [],
    companies: [],
    loaded: false,
    loading: null,
    suggestions: [],
  },
  selections: {
    assetId: "",
    tenantId: "",
    homeTenantSort: "cost",
    companyExposureMetric: "cost",
    toolAssetIds: [],
    toolCompanyIds: [],
    playgroundMode: "sandbox",
    playgroundDimension: "assetName",
    playgroundColumnDimension: "none",
    playgroundFilterDimension: "",
    playgroundFilterValue: "",
    playgroundMetric: "leasedAreaSqm",
    playgroundTopN: 25,
  },
  performance: [],
  pendingRequests: {},
  warmedDefaults: false,
};

window.__dashboardPerf = state.performance;
window.dashboardApp = {
  getState: () => state,
  switchTab: (tab) => switchTab(tab),
  refresh: () => refreshActiveTab(),
  openSupport: () => openSupportModal_(),
};

document.addEventListener("DOMContentLoaded", initializeApp);

function initializeApp() {
  initTheme_();
  if (APP_FLAGS.adminAuthRequired && !APP_FLAGS.adminSessionToken) {
    bindStandaloneAdminAuth_();
    showLoading(false);
    return;
  }
  bindGlobalEvents();
  const searchInput = document.getElementById("global-search");
  if (searchInput) searchInput.setAttribute("placeholder", "탭, 자산, 기업명을 입력해 주세요");
  hydrateUiState();
  updateSurfaceControl_();
  setPageMeta(state.activeTab);
  updateTopbar(state.bootstrap);
  renderTabSkeleton(state.activeTab, { useBootstrapHint: true });
  const cachedHome = loadSessionPayload_(buildClientCacheKey_("home"));
  if (cachedHome) {
    cachePayload_("home", buildClientCacheKey_("home"), cachedHome);
    renderPayloadForTab_("home", cachedHome);
  } else if (state.activeTab === "home") {
    renderHomeLite_(state.bootstrap.homeLiteKpis || []);
  }
  showLoading(true, "초기 화면을 준비하고 있습니다.", "기준 정보와 첫 화면 데이터를 순서대로 불러오고 있습니다.");
  bootstrapApp_();
}

function bindStandaloneAdminAuth_() {
  const input = document.getElementById("admin-auth-password");
  const button = document.getElementById("admin-auth-submit");
  const message = document.getElementById("admin-auth-message");
  const submit = () => {
    const password = input ? input.value : "";
    if (!password) {
      if (message) message.textContent = "관리자 비밀번호를 입력해주세요.";
      return;
    }
    if (button) button.disabled = true;
    if (message) message.textContent = "관리자 인증을 확인하고 있습니다.";
    callServer_("verifyAdminPassword", { password }, { timeoutMs: 30000 })
      .then((result) => {
        APP_FLAGS.adminSessionToken = normalizeFlagString_(result && result.adminSessionToken);
        APP_FLAGS.adminAuthRequired = false;
        window.APP_FLAGS = APP_FLAGS;
        const authRoot = document.getElementById("admin-auth-root");
        const appShell = document.getElementById("app-shell");
        if (authRoot) authRoot.classList.add("is-hidden");
        if (appShell) appShell.classList.remove("is-auth-locked");
        bindGlobalEvents();
        hydrateUiState();
        setPageMeta(state.activeTab);
        document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.toggle("is-active", panel.dataset.panel === state.activeTab));
        document.querySelectorAll(".nav-item").forEach((nav) => nav.classList.toggle("is-active", nav.dataset.tab === state.activeTab));
        renderTabSkeleton(state.activeTab, { useBootstrapHint: false });
        showLoading(true, "관리자 콘솔을 불러오고 있습니다.", "관리자 데이터만 바로 불러옵니다.");
        return loadTabData_("admin", { force: true, overlay: false, allowStaleFallback: false })
          .finally(() => showLoading(false));
      })
      .catch((error) => {
        if (message) message.textContent = (error && error.message) || "관리자 인증에 실패했습니다.";
      })
      .finally(() => {
        if (button) button.disabled = false;
      });
  };
  if (button) button.addEventListener("click", submit);
  if (input) {
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") submit();
    });
    input.focus();
  }
}

function bindGlobalEvents() {
  bindDevelopmentGateEvents_();
  document.querySelectorAll(".nav-item").forEach((button) => {
    button.addEventListener("click", () => switchTab(button.dataset.tab));
  });
  document.getElementById("refresh-button")?.addEventListener("click", refreshActiveTab);
  document.getElementById("mobile-menu-button")?.addEventListener("click", () => {
    document.getElementById("sidebar")?.classList.toggle("is-open");
    document.getElementById("shell-scrim")?.classList.toggle("is-open");
  });
  document.getElementById("shell-scrim")?.addEventListener("click", closeMobileMenu);
  document.getElementById("sidebar-toggle")?.addEventListener("click", toggleSidebarCollapse);
  document.getElementById("ai-fab")?.addEventListener("click", openAiPanel);
  document.getElementById("open-ai-button")?.addEventListener("click", openAiPanel);
  document.getElementById("ai-panel-close")?.addEventListener("click", closeAiPanel);
  document.getElementById("ai-submit")?.addEventListener("click", submitAiQuestionFromUi);
  document.getElementById("close-surface-button")?.addEventListener("click", closeSurface);
  document.getElementById("support-button")?.addEventListener("click", openSupportModal_);
  document.querySelectorAll("[data-theme-choice]").forEach((button) => {
    button.addEventListener("click", () => setThemePreference_(button.getAttribute("data-theme-choice")));
  });
  document.getElementById("surface-backdrop")?.addEventListener("click", closeSurface);
  document.getElementById("global-search")?.addEventListener("focus", () => {
    ensureSearchCatalogLoaded_().finally(() => updateGlobalSearchSuggestions_());
  });
  document.getElementById("global-search")?.addEventListener("input", () => {
    ensureSearchCatalogLoaded_().finally(() => updateGlobalSearchSuggestions_());
  });
  document.getElementById("global-search")?.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      hideGlobalSearchSuggestions_();
      return;
    }
    if (event.key !== "Enter") return;
    event.preventDefault();
    const suggestion = (state.searchCatalog.suggestions || [])[0];
    if (suggestion) {
      applyGlobalSearchSuggestion_(suggestion);
      return;
    }
    const value = event.target.value.trim().toLowerCase();
    if (!value) return;
    const targetTab = TAB_ORDER.find((tab) => {
      const meta = PAGE_META[tab];
      return tab.indexOf(value) > -1 || meta.title.toLowerCase().indexOf(value) > -1;
    });
    if (targetTab) switchTab(targetTab);
  });
  document.addEventListener("click", (event) => {
    const searchInput = document.getElementById("global-search");
    const suggestionBox = document.getElementById("global-search-suggestions");
    if (!searchInput || !suggestionBox) return;
    if (searchInput.contains(event.target) || suggestionBox.contains(event.target)) return;
    hideGlobalSearchSuggestions_();
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeMobileMenu();
      closeAiPanel();
      closeSurface();
    }
  });
  window.addEventListener("resize", () => {
    if (!(state.searchCatalog.suggestions || []).length) return;
    positionGlobalSearchSuggestions_();
  });
}

function bindDevelopmentGateEvents_() {
  const copy = {
    sector: {
      title: "섹터 화면은 시장 인텔리전스 구조로 다시 만들고 있습니다.",
      body: "권역, 자산, 임차인, 만기 리스크를 한 화면에서 비교할 수 있도록 재구성 중입니다.",
      hint: "현재 구현 화면을 보려면 이 안내를 더블클릭하세요.",
      aria: "더블클릭하여 섹터 개편 미리보기 화면 보기",
    },
    tools: {
      title: "분석 도구는 비교 워크벤치로 다시 만들고 있습니다.",
      body: "자산과 기업을 직접 선택해 벤치마크, 차이, 계약 원장을 한 번에 보는 구조로 재구성 중입니다.",
      hint: "현재 구현 화면을 보려면 이 안내를 더블클릭하세요.",
      aria: "더블클릭하여 분석 도구 개편 미리보기 화면 보기",
    },
    playground: {
      title: "데이터 분석은 직접 집계 분석기로 다시 만들고 있습니다.",
      body: "분석 기준, 필터, 집계 지표를 비개발자도 바로 이해할 수 있도록 재구성 중입니다.",
      hint: "현재 구현 화면을 보려면 이 안내를 더블클릭하세요.",
      aria: "더블클릭하여 데이터 분석 개편 미리보기 화면 보기",
    },
  };
  document.querySelectorAll(".tab-panel-under-construction").forEach((panel) => {
    const tab = panel.getAttribute("data-panel");
    const text = copy[tab];
    if (!text) return;
    const overlay = panel.querySelector(".tab-panel-development-overlay");
    const card = panel.querySelector(".tab-panel-development-card");
    const reset = panel.querySelector(".tab-panel-development-reset");
    if (overlay) {
      overlay.ondblclick = null;
      overlay.onkeydown = null;
      overlay.setAttribute("aria-label", text.aria);
      overlay.setAttribute("data-development-toggle", "reveal");
      overlay.addEventListener("dblclick", () => panel.classList.add("is-development-revealed"));
      overlay.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        panel.classList.add("is-development-revealed");
      });
    }
    if (card) {
      card.innerHTML = `
        <span class="tab-panel-development-badge">개편 예정</span>
        <strong>${escapeHtml_(text.title)}</strong>
        <p>${escapeHtml_(text.body)}</p>
        <p class="tab-panel-development-hint">${escapeHtml_(text.hint)}</p>
      `;
    }
    if (reset) {
      reset.onclick = null;
      reset.textContent = "개편 안내 다시 보기";
      reset.setAttribute("data-development-toggle", "reset");
      reset.addEventListener("click", () => panel.classList.remove("is-development-revealed"));
    }
  });
}

function initTheme_() {
  const saved = localStorage.getItem("dashboard.themePreference");
  state.themePreference = saved || "system";
  applyThemePreference_();
  if (typeof window.matchMedia === "function") {
    const media = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = () => {
      if (state.themePreference === "system") applyThemePreference_();
    };
    if (typeof media.addEventListener === "function") media.addEventListener("change", handler);
    else if (typeof media.addListener === "function") media.addListener(handler);
  }
}

function normalizeSearchText_(value) {
  return String(value || "").toLowerCase().replace(/\s+/g, " ").trim();
}

function getSearchAssetId_(row) {
  return String(safeGet_(row, ["assetId"]) || safeGet_(row, ["id"]) || safeGet_(row, ["value"]) || "").trim();
}

function getSearchCompanyId_(row) {
  return String(safeGet_(row, ["tenantId"]) || safeGet_(row, ["companyId"]) || safeGet_(row, ["id"]) || safeGet_(row, ["value"]) || "").trim();
}

function getSearchAssetLabel_(row) {
  return safeGet_(row, ["assetName"]) || safeGet_(row, ["label"]) || getSearchAssetId_(row);
}

function getSearchCompanyLabel_(row) {
  return safeGet_(row, ["tenantMasterName"]) || safeGet_(row, ["companyName"]) || safeGet_(row, ["label"]) || getSearchCompanyId_(row);
}

function mergeSearchOptionsById_(seedRows, fullRows, idGetter) {
  const merged = [];
  const seen = new Set();
  (fullRows || []).concat(seedRows || []).forEach((row) => {
    const id = idGetter(row);
    if (!id || seen.has(id)) return;
    seen.add(id);
    merged.push(row);
  });
  return merged;
}

function ensureSearchCatalogLoaded_() {
  if (state.searchCatalog.loaded) return Promise.resolve(state.searchCatalog);
  if (state.searchCatalog.loading) return state.searchCatalog.loading;
  const bootstrapAssets = safeGet_(state.bootstrap, ["assetOptions"]) || [];
  const bootstrapCompanies = safeGet_(state.bootstrap, ["companyOptions"]) || [];
  if (bootstrapAssets.length || bootstrapCompanies.length) {
    state.searchCatalog.assets = bootstrapAssets;
    state.searchCatalog.companies = bootstrapCompanies;
    hydrateDefaultSelectionsFromCatalog_();
  }
  const requestAssets = canUsePublicSnapshots_()
    ? fetchPublicSnapshotJson_("asset-options.json", 15000).catch(() => callServer_("getAssetOptions", undefined, { timeoutMs: 30000 }))
    : callServer_("getAssetOptions", undefined, { timeoutMs: 30000 });
  const requestCompanies = canUsePublicSnapshots_()
    ? fetchPublicSnapshotJson_("company-options.json", 15000).catch(() => callServer_("getCompanyOptions", undefined, { timeoutMs: 30000 }))
    : callServer_("getCompanyOptions", undefined, { timeoutMs: 30000 });
  state.searchCatalog.loading = Promise.all([requestAssets, requestCompanies]).then(([assets, companies]) => {
    state.searchCatalog.assets = mergeSearchOptionsById_(bootstrapAssets, assets || [], getSearchAssetId_);
    state.searchCatalog.companies = mergeSearchOptionsById_(bootstrapCompanies, companies || [], getSearchCompanyId_);
    state.searchCatalog.loaded = true;
    state.bootstrap.assetOptions = state.searchCatalog.assets.slice(0, 3);
    state.bootstrap.companyOptions = state.searchCatalog.companies.slice(0, 3);
    hydrateDefaultSelectionsFromCatalog_();
    if (!state.warmedDefaults) warmCommonTabs_();
    return state.searchCatalog;
  }).catch(() => {
    if (bootstrapAssets.length || bootstrapCompanies.length) {
      state.searchCatalog.loaded = true;
    }
    return state.searchCatalog;
  }).finally(() => {
    state.searchCatalog.loading = null;
  });
  return state.searchCatalog.loading;
}

function hydrateDefaultSelectionsFromCatalog_() {
  const firstAsset = getSearchAssetId_(safeGet_(state.searchCatalog, ["assets", 0]) || {});
  const firstTenant = getSearchCompanyId_(safeGet_(state.searchCatalog, ["companies", 0]) || {});
  if (!state.selections.assetId && firstAsset) {
    state.selections.assetId = firstAsset;
  }
  if (!state.selections.tenantId && firstTenant) {
    state.selections.tenantId = firstTenant;
  }
  if (!safeGet_(state.bootstrap, ["defaults", "assetId"]) && firstAsset) {
    state.bootstrap.defaults = Object.assign({}, state.bootstrap.defaults || {}, { assetId: firstAsset });
  }
  if (!safeGet_(state.bootstrap, ["defaults", "tenantId"]) && firstTenant) {
    state.bootstrap.defaults = Object.assign({}, state.bootstrap.defaults || {}, { tenantId: firstTenant });
  }
}

function buildGlobalSearchSuggestions_(query) {
  const normalizedQuery = normalizeSearchText_(query);
  if (!normalizedQuery) {
    return TAB_ORDER.map((tab) => ({
      type: "tab",
      value: tab,
      label: safeGet_(PAGE_META, [tab, "title"]) || tab,
      meta: "탭 이동",
    })).slice(0, 6);
  }

  const tabs = TAB_ORDER.map((tab) => ({
    type: "tab",
    value: tab,
    label: safeGet_(PAGE_META, [tab, "title"]) || tab,
    meta: "탭 이동",
    score: normalizeSearchText_(tab).startsWith(normalizedQuery) || normalizeSearchText_(safeGet_(PAGE_META, [tab, "title"])).startsWith(normalizedQuery) ? 3 : (normalizeSearchText_(tab).includes(normalizedQuery) || normalizeSearchText_(safeGet_(PAGE_META, [tab, "title"])).includes(normalizedQuery) ? 1 : 0),
  })).filter((item) => item.score > 0);

  const assets = (state.searchCatalog.assets || []).map((row) => {
    const assetId = getSearchAssetId_(row);
    const label = getSearchAssetLabel_(row);
    const text = normalizeSearchText_(label);
    if (!assetId || !text.includes(normalizedQuery)) return null;
    return {
      type: "asset",
      value: assetId,
      label: label,
      meta: "자산 보기",
      score: text.startsWith(normalizedQuery) ? 3 : 2,
    };
  }).filter(Boolean);

  const companies = (state.searchCatalog.companies || []).map((row) => {
    const tenantId = getSearchCompanyId_(row);
    const label = getSearchCompanyLabel_(row);
    const text = normalizeSearchText_(label);
    if (!tenantId || !text.includes(normalizedQuery)) return null;
    return {
      type: "company",
      value: tenantId,
      label: label,
      meta: "기업 보기",
      score: text.startsWith(normalizedQuery) ? 3 : 2,
    };
  }).filter(Boolean);

  return tabs.concat(assets, companies)
    .sort((left, right) => right.score - left.score || String(left.label).localeCompare(String(right.label), "ko"))
    .slice(0, 8);
}

function positionGlobalSearchSuggestions_() {
  const input = document.getElementById("global-search");
  const host = document.getElementById("topbar-search-slot");
  const box = document.getElementById("global-search-suggestions");
  if (!input || !host || !box) return;
  box.style.left = "0px";
  box.style.right = "0px";
  box.style.top = "calc(100% + 8px)";
  box.style.width = "auto";
}

function hideGlobalSearchSuggestions_() {
  const box = document.getElementById("global-search-suggestions");
  if (!box) return;
  box.classList.add("is-hidden");
  box.innerHTML = "";
  state.searchCatalog.suggestions = [];
}

function applyGlobalSearchSuggestion_(suggestion) {
  if (!suggestion) return;
  const input = document.getElementById("global-search");
  if (input) input.value = suggestion.label || "";
  hideGlobalSearchSuggestions_();
  if (suggestion.type === "tab") {
    switchTab(suggestion.value);
    return;
  }
  if (suggestion.type === "asset") {
    selectAssetAndReload_(suggestion.value);
    return;
  }
  if (suggestion.type === "company") {
    selectCompanyAndReload_(suggestion.value);
  }
}

function updateGlobalSearchSuggestions_() {
  const input = document.getElementById("global-search");
  const box = document.getElementById("global-search-suggestions");
  if (!input || !box) return;
  const suggestions = buildGlobalSearchSuggestions_(input.value);
  state.searchCatalog.suggestions = suggestions;
  if (!suggestions.length) {
    hideGlobalSearchSuggestions_();
    return;
  }
  box.innerHTML = suggestions.map((item, index) => `
    <button class="search-suggestion" type="button" data-search-index="${index}">
      <span class="search-suggestion-label">${escapeHtml_(item.label)}</span>
      <span class="search-suggestion-meta">${escapeHtml_(item.meta)}</span>
    </button>
  `).join("");
  box.classList.remove("is-hidden");
  positionGlobalSearchSuggestions_();
  box.querySelectorAll("[data-search-index]").forEach((button) => {
    button.addEventListener("click", () => applyGlobalSearchSuggestion_(suggestions[Number(button.getAttribute("data-search-index"))]));
  });
}

function resolveThemeFromPreference_(preference) {
  if (preference === "light" || preference === "dark") return preference;
  if (typeof window.matchMedia === "function" && window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
  return "light";
}

function applyThemePreference_() {
  state.resolvedTheme = resolveThemeFromPreference_(state.themePreference);
  const root = document.documentElement;
  root.dataset.themePreference = state.themePreference;
  root.dataset.theme = state.resolvedTheme;
  root.classList.remove("theme-light", "theme-dark");
  root.classList.add(state.resolvedTheme === "dark" ? "theme-dark" : "theme-light");
  const body = document.getElementById("app-body") || document.body;
  if (body) {
    body.dataset.themePreference = state.themePreference;
    body.dataset.themeResolved = state.resolvedTheme;
  }
  syncThemeSwitchUi_();
}

function syncThemeSwitchUi_() {
  document.querySelectorAll("[data-theme-choice]").forEach((button) => {

function setThemePreference_(preference) {
  if (!preference) return;
  state.themePreference = preference;
  localStorage.setItem("dashboard.themePreference", preference);
  applyThemePreference_();
}

function buildPublicSnapshotUrl_(name) {
  const base = getPublicSnapshotBaseUrl_().replace(/\/+$/, "");
  return base ? `${base}/${name}` : "";
}

function fetchPublicSnapshotJson_(name, timeoutMs) {
  const url = buildPublicSnapshotUrl_(name);
  if (!url) return Promise.reject(new Error("PUBLIC_SNAPSHOT_BASE_URL is not configured"));
  const controller = typeof AbortController !== "undefined" ? new AbortController() : null;
  const timer = controller ? window.setTimeout(() => controller.abort(), timeoutMs || 15000) : null;
  return fetch(url, {
    method: "GET",
    headers: { "Accept": "application/json" },
    cache: "no-store",
    signal: controller ? controller.signal : undefined,
  }).then((response) => {
    if (!response.ok) throw new Error(`Public snapshot fetch failed: ${response.status}`);
    return response.json();
  }).finally(() => {
    if (timer) window.clearTimeout(timer);
  });
}

function requestBootstrapData_() {
  if (!canUsePublicSnapshots_()) {
    return callServer_("getBootstrapData", undefined, { timeoutMs: 45000 });
  }
  return fetchPublicSnapshotJson_("bootstrap.json", 15000)
    .catch(() => callServer_("getBootstrapData", undefined, { timeoutMs: 45000 }));
}

function bootstrapApp_() {
  const start = performance.now();
  requestBootstrapData_()
    .then((bootstrap) => {
      logPerf_("bootstrap", performance.now() - start, { status: "ok" });
      applyBootstrap_(bootstrap || buildFallbackBootstrap_());
      updateTopbar(state.bootstrap);
      const activeKey = buildClientCacheKey_(state.activeTab);
      const cachedPayload = loadSessionPayload_(activeKey);
      if (cachedPayload) {
        cachePayload_(state.activeTab, activeKey, cachedPayload);
        renderPayloadForTab_(state.activeTab, cachedPayload);
        showLoading(false);
        warmCommonTabs_();
        ensureSearchCatalogLoaded_();
        return;
      }

      if (state.activeTab === "home" && state.bootstrap.home) {
        cachePayload_("home", buildClientCacheKey_("home"), state.bootstrap.home);
        renderHome(state.bootstrap.home);
        showLoading(false);
        warmCommonTabs_();
        ensureSearchCatalogLoaded_();
        return;
      }

      renderTabSkeleton(state.activeTab, { useBootstrapHint: state.activeTab === "home" });
      if (state.activeTab === "home" && (state.bootstrap.homeLiteKpis || []).length) {
        renderHomeLite_(state.bootstrap.homeLiteKpis || []);
      }
      showLoading(false);
      window.setTimeout(() => {
        loadTabData_(state.activeTab, { force: true, overlay: false }).catch((error) => handleError_(error, state.activeTab));
      }, 0);
      warmCommonTabs_();
      ensureSearchCatalogLoaded_();
    })
    .catch((error) => {
      logPerf_("bootstrap", performance.now() - start, { status: "error" });
      loadTabData_(state.activeTab, { force: true, overlay: false })
        .catch((fallbackError) => handleError_(fallbackError || error, state.activeTab))
        .finally(() => showLoading(false));
    });
}

function applyBootstrap_(bootstrap) {
  state.bootstrap = Object.assign(buildFallbackBootstrap_(), bootstrap || {});
  const defaults = state.bootstrap.defaults || {};
  if (!state.selections.assetId) {
    state.selections.assetId = defaults.assetId || "";
  }
  if (!state.selections.tenantId) {
    state.selections.tenantId = defaults.tenantId || "";
  }
  state.selections.playgroundDimension = safeGet_(state.bootstrap, ["defaults", "playgroundDimension"]) || state.selections.playgroundDimension;
  state.selections.playgroundMetric = safeGet_(state.bootstrap, ["defaults", "playgroundMetric"]) || state.selections.playgroundMetric;
  state.selections.playgroundColumnDimension = safeGet_(state.bootstrap, ["defaults", "playgroundColumnDimension"]) || state.selections.playgroundColumnDimension;
  state.selections.playgroundFilterDimension = safeGet_(state.bootstrap, ["defaults", "playgroundFilterDimension"]) || state.selections.playgroundFilterDimension;
  state.selections.playgroundFilterValue = safeGet_(state.bootstrap, ["defaults", "playgroundFilterValue"]) || state.selections.playgroundFilterValue;
  const defaultAssetPayload = safeGet_(state.bootstrap, ["defaultAssetPayload"]);
  if (defaultAssetPayload && defaults.assetId) {
    cachePayload_("asset", buildEntityCacheKey_("asset", defaults.assetId), defaultAssetPayload);
  }
  const defaultCompanyPayload = safeGet_(state.bootstrap, ["defaultCompanyPayload"]);
  if (defaultCompanyPayload && defaults.tenantId) {
    cachePayload_("company", buildEntityCacheKey_("company", defaults.tenantId), defaultCompanyPayload);
  }
}

function warmCommonTabs_() {
  if (state.warmedDefaults) return;
  if (state.activeTab !== "home") return;
  const defaultAssetId = state.selections.assetId || safeGet_(state.bootstrap, ["defaults", "assetId"]);
  const defaultTenantId = state.selections.tenantId || safeGet_(state.bootstrap, ["defaults", "tenantId"]);
  if (!defaultAssetId && !defaultTenantId) return;
  state.warmedDefaults = true;
  window.setTimeout(() => {
    if (defaultAssetId) {
      loadTabData_("asset", { force: false, overlay: false, renderIfInactive: false }).catch(() => {});
    }
    if (defaultTenantId) {
      loadTabData_("company", { force: false, overlay: false, renderIfInactive: false }).catch(() => {});
    }
  }, 600);
}

function switchTab(tab, options) {
  const settings = Object.assign({ force: false, allowStaleFallback: true }, options || {});
  if (tab === "admin" && !IS_ADMIN) return;
  state.activeTab = tab;
  invalidateAiContext_();
  setPageMeta(tab);
  document.querySelectorAll(".nav-item").forEach((button) => button.classList.toggle("is-active", button.dataset.tab === tab));
  document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.toggle("is-active", panel.dataset.panel === tab));
  closeMobileMenu();
  closeSurface();

  const cacheKey = buildClientCacheKey_(tab);
  const cached = settings.force ? null : (getCachedPayload_(cacheKey) || loadSessionPayload_(cacheKey));
  if (!settings.force && cached) {
    cachePayload_(tab, cacheKey, cached);
    renderPayloadForTab_(tab, cached);
    return;
  }

  renderTabSkeleton(tab, { useBootstrapHint: tab === "home" });
  loadTabData_(tab, { force: settings.force, overlay: false, allowStaleFallback: settings.allowStaleFallback });
}

function refreshActiveTab() {
  const key = buildClientCacheKey_(state.activeTab);
  delete state.pageCache[key];
  clearSessionPayload_(key);
  invalidateAiContext_();
  renderTabSkeleton(state.activeTab, { useBootstrapHint: state.activeTab === "home" });
  loadTabData_(state.activeTab, { force: true, overlay: false });
}

function buildClientCacheKey_(tab) {
  const version = state.bootstrap.dataVersion || "0";
  if (tab === "home") return `page:${version}:home:default`;
  if (tab === "asset") return `page:${version}:asset:${state.selections.assetId || safeGet_(state.bootstrap, ["defaults", "assetId"]) || "default"}`;
  if (tab === "company") return `page:${version}:company:${state.selections.tenantId || safeGet_(state.bootstrap, ["defaults", "tenantId"]) || "default"}`;
  if (tab === "sector") return `page:${version}:sector:default`;
  if (tab === "admin") return `page:${version}:admin:default`;
  if (tab === "tools") {
    const assets = (state.selections.toolAssetIds || []).slice().sort().join(",");
    const companies = (state.selections.toolCompanyIds || []).slice().sort().join(",");
    return `page:${version}:tools:a=${assets}|c=${companies}`;
  }
  if (tab === "playground") {
    return `page:${version}:playground:m=${state.selections.playgroundMode}|row=${state.selections.playgroundDimension}|col=${state.selections.playgroundColumnDimension}|filter=${state.selections.playgroundFilterDimension}:${state.selections.playgroundFilterValue}|metric=${state.selections.playgroundMetric}|top=${state.selections.playgroundTopN}`;
  }
  return `page:${version}:${tab}:default`;
}

function buildEntityCacheKey_(tab, entityId) {
  const version = state.bootstrap.dataVersion || "0";
  if (tab === "asset") return `page:${version}:asset:${entityId || "default"}`;
  if (tab === "company") return `page:${version}:company:${entityId || "default"}`;
  return buildClientCacheKey_(tab);
}

function getCachedPayload_(key) {
  return state.pageCache[key] || null;
}

function cachePayload_(tab, key, payload) {
  state.pageCache[key] = payload;
  state.lastSuccessfulPayloads[tab] = payload;
  if (tab !== "admin") storeSessionPayload_(key, payload);
}

function storeSessionPayload_(key, payload) {
  try {
    sessionStorage.setItem(key, JSON.stringify(payload));
  } catch (error) {
    console.warn(error);
  }
}

function loadSessionPayload_(key) {
  try {
    const raw = sessionStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch (error) {
    return null;
  }
}

function clearSessionPayload_(key) {
  try {
    sessionStorage.removeItem(key);
  } catch (error) {
    console.warn(error);
  }
}

function clearAllClientCaches_() {
  state.pageCache = {};
  try {
    sessionStorage.clear();
  } catch (error) {
    console.warn(error);
  }
}

function loadTabData_(tab, options) {
  const settings = Object.assign({ force: false, overlay: false, renderIfInactive: true, allowStaleFallback: true }, options || {});
  const cacheKey = buildClientCacheKey_(tab);
  const staleFallback = settings.allowStaleFallback ? loadSessionPayload_(cacheKey) : null;
  if (!settings.force) {
    const cached = getCachedPayload_(cacheKey) || staleFallback;
    if (cached) {
      cachePayload_(tab, cacheKey, cached);
      if (tab === state.activeTab || settings.renderIfInactive) renderPayloadForTab_(tab, cached);
      return Promise.resolve(cached);
    }
  }

  const start = performance.now();
  if (settings.overlay) showLoading(true, "데이터를 갱신하고 있습니다.", `${PAGE_META[tab].title} 화면을 새로 준비하고 있습니다.`);
  return requestPayloadForTab_(tab)
    .then((payload) => {
      cachePayload_(tab, cacheKey, payload);
      if (tab === state.activeTab || settings.renderIfInactive) {
        renderPayloadForTab_(tab, payload);
      }
      logPerf_(`tab:${tab}`, performance.now() - start, { status: "ok", cacheKey: cacheKey });
      return payload;
    })
    .catch((error) => {
      if (staleFallback) {
        cachePayload_(tab, cacheKey, staleFallback);
        if (tab === state.activeTab || settings.renderIfInactive) {
          renderPayloadForTab_(tab, staleFallback);
        }
        logPerf_(`tab:${tab}`, performance.now() - start, { status: "stale-fallback", cacheKey: cacheKey });
        return staleFallback;
      }
      logPerf_(`tab:${tab}`, performance.now() - start, { status: "error", cacheKey: cacheKey });
      handleError_(error, tab);
      throw error;
    })
    .finally(() => {
      if (settings.overlay) showLoading(false);
    });
}

function requestPayloadForTab_(tab) {
  if (tab === "home") {
    if (canUsePublicSnapshots_()) return fetchPublicSnapshotJson_("home.json", 15000).catch(() => callServer_("getHomeData", undefined, { timeoutMs: 60000 }));
    return callServer_("getHomeData", undefined, { timeoutMs: 60000 });
  }
  if (tab === "asset") {
    const assetId = state.selections.assetId || safeGet_(state.bootstrap, ["defaults", "assetId"]) || "";
    if (canUsePublicSnapshots_() && assetId) return fetchPublicSnapshotJson_(`asset/${encodeURIComponent(assetId)}.json`, 15000).catch(() => callServer_("getAssetData", assetId, { timeoutMs: 60000 }));
    return callServer_("getAssetData", assetId, { timeoutMs: 60000 });
  }
  if (tab === "company") {
    const tenantId = state.selections.tenantId || safeGet_(state.bootstrap, ["defaults", "tenantId"]) || "";
    if (canUsePublicSnapshots_() && tenantId) return fetchPublicSnapshotJson_(`company/${encodeURIComponent(tenantId)}.json`, 15000).catch(() => callServer_("getCompanyData", tenantId, { timeoutMs: 60000 }));
    return callServer_("getCompanyData", tenantId, { timeoutMs: 60000 });
  }
  if (tab === "sector") return callServer_("getSectorData", undefined, { timeoutMs: 45000 });
  if (tab === "tools") return callServer_("getToolsData", { assetIds: state.selections.toolAssetIds || [], companyIds: state.selections.toolCompanyIds || [] }, { timeoutMs: 45000 });
  if (tab === "playground") {
    return callServer_("getPlaygroundData", {
      rowDimension: state.selections.playgroundDimension,
      columnDimension: state.selections.playgroundColumnDimension,
      filterDimension: state.selections.playgroundFilterDimension,
      filterValue: state.selections.playgroundFilterValue,
      valueMetric: state.selections.playgroundMetric,
      topN: state.selections.playgroundTopN,
  }, { timeoutMs: 45000 });
  }
  if (tab === "admin") {
    if (!APP_FLAGS.adminSessionToken) return Promise.resolve({ requiresPassword: true });
    return callServer_("getAdminDashboardData", buildAdminRequest_(), { timeoutMs: 90000 });
  }
  return Promise.resolve(null);
}

function buildAdminRequest_() {
  return { adminSessionToken: APP_FLAGS.adminSessionToken || "" };
}

function renderAdminPasswordGate_(view) {
  view.innerHTML = `
    <div class="page-stack">
      <section class="workspace-panel workspace-panel-role admin-password-gate">
        <div class="hero-head">
          <div>
            <p class="page-kicker">Admin Console</p>

            <p class="hero-subtitle">관리자 기능은 비밀번호 확인 후에만 열립니다. URL에는 비밀번호를 넣지 않습니다.</p>
            ${renderBasisLine_("현재 세션", "관리자 인증", "비밀번호", "Apps Script 임시 세션")}
          </div>
        </div>
        <div class="admin-password-box">
          <label class="control-label" for="admin-password-input">관리자 비밀번호</label>
          <div class="admin-password-row">
            <input id="admin-password-input" class="control-input" type="password" autocomplete="current-password" placeholder="관리자 비밀번호를 입력하세요">
            <button id="admin-password-submit" class="primary-button" type="button">관리자 콘솔 열기</button>
          </div>
          <p id="admin-password-message" class="page-note">비밀번호가 맞으면 이 브라우저 세션에만 임시 관리자 토큰이 발급됩니다.</p>
        </div>
      </section>
    </div>
  `;
  const input = document.getElementById("admin-password-input");
  const button = document.getElementById("admin-password-submit");
  const message = document.getElementById("admin-password-message");
  const submit = () => {
    const password = input ? input.value : "";
    if (!password) {
      if (message) message.textContent = "관리자 비밀번호를 입력해주세요.";
      return;
    }
    if (button) button.disabled = true;
    if (message) message.textContent = "관리자 인증을 확인하고 있습니다.";
    callServer_("verifyAdminPassword", { password }, { timeoutMs: 30000 })
      .then((result) => {
        APP_FLAGS.adminSessionToken = normalizeFlagString_(result && result.adminSessionToken);
        window.APP_FLAGS = APP_FLAGS;
        clearAllClientCaches_();

      .catch((error) => {

      })
      .finally(() => {
        if (button) button.disabled = false;
      });

  if (input) {

      if (event.key === "Enter") submit();
    });
    input.focus();
  }

function openSurface_(options) {
  const layer = document.getElementById("surface-layer");
  const modalHost = document.getElementById("modal-host");
  const panelHost = document.getElementById("detail-panel-host");
  closeSurface();

  const targetHost = options.mode === "panel" ? panelHost : modalHost;
  layer.classList.add("is-open", options.mode === "panel" ? "is-panel-open" : "is-modal-open");
  targetHost.setAttribute("aria-hidden", "false");
  targetHost.innerHTML = `
    <div class="surface-frame ${escapeHtml_(options.frameClass || "")}">
      <div class="surface-head">
        <div class="surface-head-copy">
          <h3 class="surface-title">${escapeHtml_(options.title || "상세")}</h3>

      </div>
      <div class="surface-body">${options.bodyHtml || renderEmptyState_("표시할 상세가 없습니다.")}</div>
    </div>
  `;
  targetHost.querySelector("[data-close-surface]")?.addEventListener("click", closeSurface);
  document.body.classList.add("has-surface-open");
  updateSurfaceControl_(options.mode);
}

function closeSurface() {
  const layer = document.getElementById("surface-layer");
  const modalHost = document.getElementById("modal-host");
  const panelHost = document.getElementById("detail-panel-host");
  layer?.classList.remove("is-open", "is-modal-open", "is-panel-open");
  if (modalHost) {
    modalHost.innerHTML = "";
    modalHost.setAttribute("aria-hidden", "true");
  }
  if (panelHost) {
    panelHost.innerHTML = "";
    panelHost.setAttribute("aria-hidden", "true");
  }
  document.body.classList.remove("has-surface-open");
  updateSurfaceControl_();
}

function updateSurfaceControl_(mode) {
  const button = document.getElementById("close-surface-button");
  if (!button) return;
  const visible = mode === "panel" || mode === "modal";
  button.classList.toggle("is-hidden", !visible);
  button.setAttribute("aria-hidden", visible ? "false" : "true");
}

function expandClientFloorLabels_(floorLabel) {
  const normalize = (value) => String(value == null ? "" : value).replace(/\s+/g, " ").trim();
  const text = normalize(floorLabel);
  if (!text) return ["층 미입력"];
  return text.split(",").map((token) => normalize(token)).filter(Boolean).flatMap((token) => {
    if (token.indexOf("~") === -1) return [token];
    const parts = token.split("~").map((part) => normalize(part)).filter(Boolean);
    if (parts.length !== 2) return [token];
    const start = parts[0];
    const end = parts[1];
    const startMatch = start.match(/^([A-Za-z]*)(-?\d+)$/);
    const endMatch = end.match(/^([A-Za-z]*)(-?\d+)$/);
    if (!startMatch || !endMatch) return [token];
    const startPrefix = startMatch[1] || "";
    const endPrefix = endMatch[1] || startPrefix;
    const startNumber = Number(startMatch[2]);
    const endNumber = Number(endMatch[2]);
    if (!Number.isFinite(startNumber) || !Number.isFinite(endNumber) || startPrefix !== endPrefix) return [token];
    const step = startNumber <= endNumber ? 1 : -1;
    const expanded = [];
    for (let value = startNumber; step > 0 ? value <= endNumber : value >= endNumber; value += step) {
      expanded.push(`${startPrefix}${value}`);
    }
    return expanded.length ? expanded : [token];
  });
}

function expandClientStackingFloors_(floors) {
  return (floors || []).flatMap((floor) => {
    const floorLabels = expandClientFloorLabels_(floor.floorLabel);
    const tenants = floor.tenants || [];
    if (!floorLabels.length) return [floor];
    return floorLabels.map((floorLabel) => ({
      floorLabel,
      totalFloorAreaSqm: floorLabels.length > 1 && floor.totalFloorAreaSqm != null ? roundNumber_(Number(floor.totalFloorAreaSqm) / floorLabels.length, 2) : floor.totalFloorAreaSqm,
      tenants: tenants.map((tenant) => Object.assign({}, tenant, {
        leasedAreaSqm: floorLabels.length > 1 && tenant.leasedAreaSqm != null ? roundNumber_(Number(tenant.leasedAreaSqm) / floorLabels.length, 2) : tenant.leasedAreaSqm,
      })),
    }));
  });
}

function expandAssetRowsByFloorClient_(rows) {
  const amountFields = [
    "leasedAreaSqm",
    "exclusiveAreaSqm",

function loadChartJs_() {
  if (window.Chart) return Promise.resolve(window.Chart);
  if (!state.chartReady) {
    state.chartReady = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      const secureProtocol = ["h", "t", "t", "p", "s"].join("") + String.fromCharCode(58);
      script.src = secureProtocol + String.fromCharCode(47, 47) + "cdn.jsdelivr.net/npm/chart.js";
      script.onload = () => resolve(window.Chart);
      script.onerror = (error) => {
        state.chartReady = null;
        reject(error);
      };
      document.head.appendChild(script);
    });
  }
  return state.chartReady;
}

function getChartPalette_() {
  const style = getComputedStyle(document.documentElement);
  const pick = (name, fallback) => {
    const value = String(style.getPropertyValue(name) || "").trim();
    return value || fallback;
  };
  const primary = pick("--primary", "#9dd920");
  const secondary = pick("--secondary", "#426bd0");
  const strong = pick("--text-strong", "#16202b");
  const muted = pick("--text-muted", "#708195");
  const faint = pick("--text-faint", "#97a4b4");
  const outline = pick("--outline", "rgba(112, 124, 142, 0.18)");
  const ok = pick("--ok", "#2b7d3d");
  const warn = pick("--warn", "#a86d08");
  const danger = pick("--danger", "#d45f43");
  return {
    primary: primary,
    secondary: secondary,
    strong: strong,
    muted: muted,
    faint: faint,
    outline: outline,
    series: [primary, secondary, ok, warn, danger, strong],
  };
}

function cssColorToRgba_(color, alpha) {
  const text = String(color || "").trim();
  if (!text) return `rgba(15, 23, 42, ${alpha})`;
  if (text[0] === "#") {
    let hex = text.slice(1);
    if (hex.length === 3) hex = hex.split("").map((part) => part + part).join("");
    if (hex.length === 6) {
      const red = parseInt(hex.slice(0, 2), 16);
      const green = parseInt(hex.slice(2, 4), 16);
      const blue = parseInt(hex.slice(4, 6), 16);
      return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
    }
  }
  const match = text.match(/rgba?\(([^)]+)\)/i);
  if (match) {
    const parts = match[1].split(",").map((part) => part.trim());
    if (parts.length >= 3) return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
  }
  return text;
}

function buildChartBaseOptions_(palette, extraOptions) {
  const valueType = safeGet_(extraOptions || {}, ["valueType"]) || "number";
  const mergedOptions = Object.assign({}, extraOptions || {});
  delete mergedOptions.valueType;
  const options = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 260 },
    plugins: {
      legend: {
        position: "bottom",
        labels: {
          color: palette.muted,
          boxWidth: 14,
          boxHeight: 14,
          padding: 18,
          usePointStyle: true,
          pointStyle: "circle",
          font: { size: 11, weight: "700" },
        },
      },
      tooltip: {
        backgroundColor: cssColorToRgba_(palette.strong, 0.94),
        titleColor: "#ffffff",
        bodyColor: "#f8fafc",
        borderColor: cssColorToRgba_(palette.outline, 0.8),
        borderWidth: 1,
        padding: 12,
        displayColors: true,
      },
    },
    scales: {
      x: {
        ticks: { color: palette.faint, font: { size: 10, weight: "700" } },
        grid: { display: false },
        border: { display: false },
      },
      y: {
        ticks: {
          color: palette.faint,
          font: { size: 10 },
          callback: (value) => formatChartTickValue_(value, valueType),
        },
        grid: { color: palette.outline },
        border: { display: false },
      },
    },
  };
  return Object.assign(options, mergedOptions);
}

function formatChartTickValue_(value, valueType) {
  const numeric = numericOrNull_(value);
  if (numeric == null) return "";
  if (valueType === "currency") {
    if (Math.abs(numeric) >= 100000000) return `${roundNumber_(numeric / 100000000, 1)}억`;
    if (Math.abs(numeric) >= 10000) return `${roundNumber_(numeric / 10000, 1)}만`;
    return `${formatNumber_(numeric)}원`;
  }
  if (valueType === "area") {
    if (Math.abs(numeric) >= 10000) return `${roundNumber_(numeric / 10000, 1)}만㎡`;
    return `${formatNumber_(numeric)}㎡`;
  }
  if (valueType === "percent") return `${roundNumber_(numeric * 100, 1)}%`;
  if (valueType === "months") return `${formatNumber_(numeric)}개월`;
  if (valueType === "count") return `${formatNumber_(numeric)}개`;
  return formatNumber_(numeric);
}

          grid: { drawOnChartArea: false, color: palette.outline },

        },
        options: Object.assign(options, {
          plugins: Object.assign({}, options.plugins || {}, {
            tooltip: Object.assign({}, safeGet_(options, ["plugins", "tooltip"]) || {}, {
              callbacks: {
                label: (context) => {
                  const label = safeGet_(context, ["dataset", "label"]) || "";

                  return `${label}: ${formatChartTickValue_(context.parsed && context.parsed.y, series.valueType || (context.dataset && context.dataset.yAxisID === "y1" ? rightValueType : leftValueType))}`;
                },
              },
            }),
          }),
        }),
      });
      canvas.onclick = () => config.onClick && config.onClick();
    })
    .catch(() => {

function renderIntegrationDiagnosticCard_(title, status, fallbackCountLabel) {
  const blocker = safeGet_(status, ["blocker"]) || {};
  const isBlocking = !!blocker.blocking;
  const stateLabel = blocker.state || (status && status.ready ? "clear" : "unknown");
  const count = blocker.count != null ? blocker.count : firstDefinedNumber_(status && status.pendingCompanies, status && status.pendingAssets);
  const lastMessage = status && (status.lastFailureMessage || status.lastAttemptMessage || status.lastSuccessMessage);
  return `
    <div class="summary-item integration-diagnostic-card ${isBlocking ? "is-review" : ""}">
      <h4>${escapeHtml_(title)} ${renderStatusChip_(isBlocking ? "review_required" : stateLabel === "clear" ? "ok" : "review_required")}</h4>
      <p>${escapeHtml_(blocker.message || "차단 상태가 없습니다.")}</p>
      <p>${escapeHtml_(fallbackCountLabel || "대기 건수")}: ${formatNumber_(count)}</p>
      ${lastMessage ? `<p>최근 실행: ${escapeHtml_(lastMessage)}</p>` : ""}
    </div>
  `;
}

  };
  return map[region] || region || "미분류";
}

function advancedBasis_(payload, scope, unit, source) {
  return {
    asOfText: safeGet_(payload, ["basisDisplay", "asOf"]) || safeGet_(payload, ["generatedAt"]) || "-",
    scopeText: scope,
    unitText: unit,
    sourceText: source,
  };
}

function renderAdvancedKpi_(label, valueHtml, payload, scope, unit, source, action) {
  return renderMetricTile_({
    label,
    valueHtml,
    metaHtml: renderBasisLine_(advancedBasis_(payload, scope, unit, source)),
    clickable: !!action,
    action: action || "",
  });
}

function bindAdvancedFilter_(inputSelector, listSelector) {
  const input = document.querySelector(inputSelector);
  const list = document.querySelector(listSelector);
  if (!input || !list) return;
  const applyFilter = () => {
    const query = normalizeSearchText_(input.value);
    list.querySelectorAll(".toggle-item").forEach((item) => {
      item.hidden = !!query && !normalizeSearchText_(item.textContent).includes(query);
    });
  };
  input.addEventListener("input", applyFilter);
  applyFilter();
}

  const view = getTabRoot_("sector");

function callServer_(functionName, payload, options) {
  const settings = Object.assign({ timeoutMs: 15000 }, options || {});
  const start = performance.now();
  const requestKey = `${functionName}:${payload === undefined ? "void" : JSON.stringify(payload)}`;
  if (state.pendingRequests[requestKey]) return state.pendingRequests[requestKey];
  const requestPromise = new Promise((resolve, reject) => {
    if (typeof google === "undefined" || !google.script || !google.script.run) {
      reject(new Error("google.script.run is unavailable"));
      return;
    }
    let settled = false;
    const timer = window.setTimeout(() => {
      if (settled) return;
      settled = true;
      reject(new Error(`${functionName} timed out after ${settings.timeoutMs}ms`));
    }, settings.timeoutMs);

    const success = (result) => {
      if (settled) return;
      settled = true;
      window.clearTimeout(timer);
      logPerf_(functionName, performance.now() - start, { status: "ok" });
      resolve(result);
    };
    const failure = (error) => {
      if (settled) return;
      settled = true;
      window.clearTimeout(timer);
      logPerf_(functionName, performance.now() - start, { status: "error" });
      reject(error);
    };

    let runner = google.script.run.withSuccessHandler(success).withFailureHandler(failure);
    if (payload === undefined) runner[functionName]();
    else runner[functionName](payload);
  }).finally(() => {
    delete state.pendingRequests[requestKey];
  });
  state.pendingRequests[requestKey] = requestPromise;
  return requestPromise;
}

function toKeyedMap_(items, key) {

    accumulator[item[key]] = item;
    return accumulator;
  }, {});
}

function buildRegionRows_(points) {
  const grouped = {};
  (points || []).forEach((point) => {
    const source = String(point.address || point.assetName || "");
    const region = source.indexOf("경기") > -1 ? "경기" : source.indexOf("인천") > -1 ? "인천" : source.indexOf("서울") > -1 ? "서울" : source.indexOf("부산") > -1 ? "부산" : source.indexOf("경상") > -1 ? "경상" : source.indexOf("충청") > -1 ? "충청" : source.indexOf("전라") > -1 ? "전라" : "기타";
    grouped[region] = (grouped[region] || 0) + 1;
  });
  return Object.keys(grouped).map((key) => ({ label: key, value: grouped[key] }));
}

function normalizePieRows_(rows) {
  return (rows || []).map((row) => ({ label: row.label || "미분류", value: row.value }));
}

function getSortBucketKoFirst_(value) {
  const text = String(value || "").trim();
  if (!text) return 9;
  const first = text.charCodeAt(0);
  if (first >= 0xac00 && first <= 0xd7a3) return 0;
  if ((first >= 65 && first <= 90) || (first >= 97 && first <= 122)) return 1;
  if (first >= 48 && first <= 57) return 2;
  return 3;
}

function sortRowsByLabelKoFirst_(rows, field) {
  return (rows || []).slice().sort((left, right) => {
    const leftLabel = String(safeGet_(left, [field]) || "");
    const rightLabel = String(safeGet_(right, [field]) || "");
    const bucketDelta = getSortBucketKoFirst_(leftLabel) - getSortBucketKoFirst_(rightLabel);
    if (bucketDelta !== 0) return bucketDelta;
    return leftLabel.localeCompare(rightLabel, "ko");
  });
}

function buildTenantAggregateRows_(rows) {
  const grouped = {};
  (rows || []).forEach((row) => {
    const key = row.tenantId || row.tenantMasterName || row.tenantName || row.companyName || row.leaseSpaceId;
    if (!key) return;
    grouped[key] = grouped[key] || {
      tenantId: row.tenantId || "",
      tenantMasterName: firstNonEmptyValue_(row.tenantMasterName, row.tenantName, row.companyName) || "-",
      leasedAreaSqm: 0,
      leasedAreaPy: 0,
      monthlyRentTotal: 0,
      monthlyMfTotal: 0,
      monthlyCombinedTotal: 0,
      currentEndDates: [],
      spaces: [],
      rowCount: 0,
      eNocValues: [],
    };
    const bucket = grouped[key];
    bucket.rowCount += 1;
    bucket.leasedAreaSqm += Number(firstDefinedNumber_(row.leasedAreaSqm, 0) || 0);
    bucket.leasedAreaPy += Number(firstDefinedNumber_(row.leasedAreaPy, derivePyValue_(row.leasedAreaSqm, null), 0) || 0);
    bucket.monthlyRentTotal += Number(firstDefinedNumber_(row.currentMonthlyRentTotal, row.monthlyRentTotal, 0) || 0);
    bucket.monthlyMfTotal += Number(firstDefinedNumber_(row.currentMonthlyMfTotal, row.monthlyMfTotal, 0) || 0);
    bucket.monthlyCombinedTotal += Number(firstDefinedNumber_(row.currentMonthlyCombinedTotal, row.monthlyCombinedTotal, row.monthlyCostTotal, 0) || 0);
    if (row.currentEndDate) bucket.currentEndDates.push(row.currentEndDate);
    if (row.spaceLabel) bucket.spaces.push(row.spaceLabel);
    if (row.eNoc != null) bucket.eNocValues.push(Number(row.eNoc));
  });
  return Object.keys(grouped).map((key) => {
    const bucket = grouped[key];
    const sortedEndDates = bucket.currentEndDates.filter(Boolean).sort();
    return Object.assign(bucket, {
      latestExpiry: sortedEndDates.length ? sortedEndDates[sortedEndDates.length - 1] : "",
      earliestExpiry: sortedEndDates.length ? sortedEndDates[0] : "",
      spaceLabel: Array.from(new Set(bucket.spaces.filter(Boolean))).join(", "),
      averageENoc: bucket.eNocValues.length ? Math.round(bucket.eNocValues.reduce((sum, value) => sum + value, 0) / bucket.eNocValues.length) : null,
    });
  });
}

function buildTenantExpiryGroups_(rows) {
  const grouped = {};
  (rows || []).forEach((row) => {
    const tenantName = firstNonEmptyValue_(row.tenantMasterName, row.tenantName, row.companyName) || "-";
    const endDate = firstNonEmptyValue_(row.currentEndDate, row.latestExpiry, row.endDate) || "";
    const key = `${row.tenantId || tenantName}|${endDate || "no-expiry"}`;
    grouped[key] = grouped[key] || {
      tenantId: row.tenantId || "",
      tenantMasterName: tenantName,
      currentEndDate: endDate,
      monthsToExpiry: row.monthsToExpiry,
      leasedAreaSqm: 0,
      monthlyCombinedTotal: 0,
      spaceLabels: [],
    };
    const bucket = grouped[key];
    bucket.leasedAreaSqm += Number(firstDefinedNumber_(row.leasedAreaSqm, 0) || 0);
    bucket.monthlyCombinedTotal += Number(firstDefinedNumber_(row.currentMonthlyCombinedTotal, row.monthlyCombinedTotal, row.monthlyCostTotal, 0) || 0);
    if (row.spaceLabel) bucket.spaceLabels.push(row.spaceLabel);
    if (bucket.monthsToExpiry == null && row.monthsToExpiry != null) bucket.monthsToExpiry = row.monthsToExpiry;
  });
  return Object.keys(grouped).map((key) => Object.assign(grouped[key], {
    spaceLabel: Array.from(new Set(grouped[key].spaceLabels.filter(Boolean))).join(", "),
  })).sort((left, right) => {
    const leftMonths = numericOrNull_(left.monthsToExpiry);
    const rightMonths = numericOrNull_(right.monthsToExpiry);
    if (leftMonths == null && rightMonths == null) return String(left.currentEndDate || "").localeCompare(String(right.currentEndDate || ""));
    if (leftMonths == null) return 1;
    if (rightMonths == null) return -1;
    return leftMonths - rightMonths;
  });
}

function renderPortfolioMapPreview_(points) {

  const maxLng = Math.max.apply(null, validPoints.map((point) => Number(point.longitude)));

function getNaverMapConfig_() {

    expectedOrigins: Array.isArray(safeGet_(runtime, ["naverMapsAllowedOriginHints"])) ? safeGet_(runtime, ["naverMapsAllowedOriginHints"]) : [],
  };

}

function collectNaverMapOriginDiagnostics_() {
  const runtime = window.RUNTIME_CLIENT_CONFIG || {};
  const config = getNaverMapConfig_();
  const currentOrigin = window.location && window.location.origin ? window.location.origin : "";
  const currentHost = window.location && window.location.hostname ? window.location.hostname : "";
  const referrer = document.referrer || "";
  let topOrigin = "";
  let topBlocked = false;
  try {
    topOrigin = window.top && window.top.location && window.top.location.origin ? window.top.location.origin : "";
  } catch (error) {
    topBlocked = true;
  }
  return {
    currentOrigin,
    currentHost,
    referrer,
    topOrigin,
    topBlocked,
    dynamicClientIdConfigured: !!config.dynamicClientId,
    staticKeyIdConfigured: !!config.staticKeyId,
    deploymentChannel: safeGet_(runtime, ["deploymentChannel"]) || "",
    webappAccess: safeGet_(runtime, ["webappAccess"]) || "",
    qaRoutingStatus: safeGet_(runtime, ["qaRoutingStatus"]) || "",
    expectedOrigins: config.expectedOrigins || [],
  };
}

function registerNaverMapAuthFailureHandler_(mountToken, root, points) {
  window.__activeNaverMapMount = {
    mountToken,
    root,
    points,
  };
  window.navermap_authFailure = function () {
    const active = window.__activeNaverMapMount;
    if (!active || active.mountToken !== mountToken) return;
    const mount = getPortfolioMapMountNodes_(active.root);
    if (!mount.container || mount.container.dataset.mapMountToken !== mountToken) return;
    renderServerStaticPortfolioMap_(mount.container, active.points || [], active.root, "auth-failed").then((ok) => {
      if (ok || mount.container.dataset.mapMountToken !== mountToken) return;
      renderOpenStreetMapPortfolioMap_(mount.container, active.points || [], active.root).then((leafletOk) => {
        if (leafletOk || mount.container.dataset.mapMountToken !== mountToken) return;
        renderSchematicPortfolioMap_(mount.container, active.points || []);
        mount.container.dataset.mapMode = "auth-failed";
      });
    });
    mount.container.dataset.mapMode = "auth-failed";
    setPortfolioMapStatus_("네이버 Dynamic Map 인증 실패 · NCP 허용 도메인 확인 필요", "fallback", active.root);
    setPortfolioMapHelp_("실제 iframe origin이 NCP Web 서비스 URL에 없으면 Dynamic Map이 차단됩니다. 아래 진단의 origin 값을 그대로 등록해 주세요.", active.root);
    setPortfolioMapDiagnostics_({ message: "navermap_authFailure 호출됨" }, active.root);
  };
}

function clearNaverMapAuthFailureHandler_(mountToken) {
  const active = window.__activeNaverMapMount;

}

function normalizePortfolioMapPoints_(points) {
  return (points || []).map((point, index) => {
    const latitude = numericOrNull_(point.latitude);
    const longitude = numericOrNull_(point.longitude);
    if (latitude == null || longitude == null) return null;
    return {
      assetId: point.assetId || "",
      assetName: firstNonEmptyValue_(point.assetName, point.label, `Asset ${index + 1}`),
      address: firstNonEmptyValue_(point.address, point.standardizedAddress, "-"),
      latitude: latitude,
      longitude: longitude,
      markerIndex: index + 1,
    };
  }).filter(Boolean).slice(0, 20);
}

function buildPortfolioMapViewport_(points) {
  const normalized = normalizePortfolioMapPoints_(points);
  const latitudes = normalized.map((point) => point.latitude);
  const longitudes = normalized.map((point) => point.longitude);
  const minLat = latitudes.length ? Math.min.apply(null, latitudes) : 37.5665;
  const maxLat = latitudes.length ? Math.max.apply(null, latitudes) : 37.5665;
  const minLng = longitudes.length ? Math.min.apply(null, longitudes) : 126.978;
  const maxLng = longitudes.length ? Math.max.apply(null, longitudes) : 126.978;
  return {
    minLat,
    maxLat,
    minLng,
    maxLng,
    latSpan: Math.max(maxLat - minLat, 0.02),
    lngSpan: Math.max(maxLng - minLng, 0.02),
    center: {
      latitude: roundNumber_((minLat + maxLat) / 2, 6),
      longitude: roundNumber_((minLng + maxLng) / 2, 6),
    },
  };
}

function estimatePortfolioMapLevel_(points) {
  const viewport = buildPortfolioMapViewport_(points);
  const span = Math.max(viewport.latSpan, viewport.lngSpan);
  if (span > 5) return 6;
  if (span > 2) return 7;
  if (span > 1) return 8;
  if (span > 0.45) return 9;
  if (span > 0.22) return 10;
  if (span > 0.12) return 11;
  if (span > 0.06) return 12;
  if (span > 0.03) return 13;
  return 14;
}

function buildNaverStaticMapUrl_(points, width, height) {
  const config = getNaverMapConfig_();
  const normalized = normalizePortfolioMapPoints_(points);
  if (!config.staticKeyId || !normalized.length) return "";
  const viewport = buildPortfolioMapViewport_(normalized);
  const params = new URLSearchParams();
  params.set("w", String(Math.max(320, Math.min(1024, Math.round(width || 920)))));
  params.set("h", String(Math.max(280, Math.min(640, Math.round(height || 420)))));
  params.set("center", `${viewport.center.longitude},${viewport.center.latitude}`);
  params.set("level", String(estimatePortfolioMapLevel_(normalized)));
  params.set("scale", "2");
  params.set("lang", "ko");
  params.set("X-NCP-APIGW-API-KEY-ID", config.staticKeyId);
  params.append("markers", `type:d|size:mid|color:Blue|pos:${normalized.map((point) => `${point.longitude} ${point.latitude}`).join(",")}`);
  return `https://maps.apigw.ntruss.com/map-static/v2/raster-cors?${params.toString()}`;
}

function loadNaverMapsSdk_() {
  if (window.naver && window.naver.maps) return Promise.resolve(window.naver.maps);
  if (window.__naverMapsSdkPromise) return window.__naverMapsSdkPromise;
  const config = getNaverMapConfig_();
  if (!config.dynamicClientId) return Promise.reject(new Error("NAVER Maps client id is missing."));
  window.__naverMapsSdkPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    const callbackName = "__dashboardNaverMapsSdkReady";
    let settled = false;
    const cleanup = () => {
      script.onload = null;
      script.onerror = null;
      if (window[callbackName] === handleCallback) window[callbackName] = null;
    };
    const finishSuccess = () => {
      if (settled) return;
      settled = true;
      cleanup();
      resolve(window.naver.maps);
    };
    const finishFailure = (message) => {
      if (settled) return;
      settled = true;
      cleanup();
      window.__naverMapsSdkPromise = null;
      reject(new Error(message));
    };
    const pollReady = (attempt) => {
      if (window.naver && window.naver.maps) {
        finishSuccess();
        return;
      }
      if ((attempt || 0) >= 80) {
        finishFailure("NAVER Maps SDK loaded but naver.maps is still unavailable.");
        return;
      }
      window.setTimeout(() => pollReady((attempt || 0) + 1), 100);
    };
    const handleCallback = () => pollReady(0);
    script.async = true;
    script.defer = true;
    script.onload = () => pollReady(0);
    script.onerror = () => {
      finishFailure("NAVER Maps SDK failed to load.");
    };
    window[callbackName] = handleCallback;
    script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${encodeURIComponent(config.dynamicClientId)}&callback=${encodeURIComponent(callbackName)}`;
    script.dataset.dashboardNaverMapsSdk = "true";
    document.head.appendChild(script);
  }).catch((error) => {
    window.__naverMapsSdkPromise = null;
    throw error;
  });
  return window.__naverMapsSdkPromise;
}

function renderPortfolioMapSchematic_(points) {

function renderStaticPortfolioMap_(container, points) {
  container.dataset.mapMode = "static";
  const url = buildNaverStaticMapUrl_(points, container.clientWidth || 920, container.clientHeight || 420);
  if (!url) {
    renderSchematicPortfolioMap_(container, points);
    return false;
  }
  container.innerHTML = `<img class="portfolio-map-static-image" src="${escapeHtml_(url)}" alt="네이버 정적 지도" loading="lazy">`;

function renderServerStaticPortfolioMap_(container, points, root, reason) {
  const normalized = normalizePortfolioMapPoints_(points);
  if (!normalized.length) return Promise.resolve(false);
  if (typeof google === "undefined" || !google.script || !google.script.run) return Promise.resolve(false);
  container.dataset.mapMode = "server-static-loading";
  container.innerHTML = `<div class="chart-placeholder">네이버 지도 이미지를 생성하고 있습니다.</div>`;
  setPortfolioMapStatus_("네이버 정적 지도 생성 중", "fallback", root);
  return callServer_("getNaverStaticMapDataUrl", {
    points: normalized,
    width: container.clientWidth || 920,
    height: container.clientHeight || 420,
    reason: reason || "dynamic-fallback",
  }, { timeoutMs: 20000 }).then((result) => {
    if (!result || !result.ok || !result.dataUrl) {
      throw new Error((result && result.message) || "server static map unavailable");
    }
    container.dataset.mapMode = "server-static";
    container.innerHTML = `<img class="portfolio-map-static-image" src="${escapeHtml_(result.dataUrl)}" alt="네이버 정적 지도">`;
    setPortfolioMapStatus_(`네이버 정적 지도 · ${normalized.length}개 자산`, "fallback", root);
    setPortfolioMapHelp_("Dynamic Map 인증이 막혀 서버 프록시 정적 지도로 대체 표시했습니다.", root);
    setPortfolioMapDiagnostics_({
      message: "Server Static Map fallback success",
      sdkUrl: result.requestUrl || "",
    }, root);
    return true;
  }).catch((error) => {
    setPortfolioMapDiagnostics_({
      message: "Server Static Map fallback failed",
      error: (error && error.message) || String(error || ""),
    }, root);
    return false;
  });
}

function loadLeafletMapSdk_() {
  if (window.L && window.L.map) return Promise.resolve(window.L);
  if (window.__leafletMapSdkPromise) return window.__leafletMapSdkPromise;
  window.__leafletMapSdkPromise = new Promise((resolve, reject) => {
    const stylesheetId = "dashboard-leaflet-css";
    if (!document.getElementById(stylesheetId)) {
      const link = document.createElement("link");
      link.id = stylesheetId;
      link.rel = "stylesheet";
      link.href = "https:" + String.fromCharCode(47, 47) + "cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css";
      document.head.appendChild(link);
    }
    const script = document.createElement("script");
    script.async = true;
    script.src = "https:" + String.fromCharCode(47, 47) + "cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js";
    script.onload = () => {
      if (window.L && window.L.map) resolve(window.L);
      else reject(new Error("Leaflet loaded but L.map is unavailable."));
    };
    script.onerror = () => reject(new Error("Leaflet failed to load."));
    document.head.appendChild(script);
  }).catch((error) => {
    window.__leafletMapSdkPromise = null;
    throw error;
  });
  return window.__leafletMapSdkPromise;
}

function renderOpenStreetMapPortfolioMap_(container, points, root) {
  const normalized = normalizePortfolioMapPoints_(points);
  if (!normalized.length) return Promise.resolve(false);
  container.dataset.mapMode = "leaflet-loading";
  container.innerHTML = `<div class="chart-placeholder">임시 동적 지도를 불러오고 있습니다.</div>`;
  return loadLeafletMapSdk_().then((L) => {
    container.dataset.mapMode = "leaflet";
    const mapId = `leaflet-map-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    container.innerHTML = `<div id="${mapId}" style="width:100%;height:100%;min-height:360px;border-radius:inherit;"></div>`;
    const viewport = buildPortfolioMapViewport_(normalized);
    const map = L.map(mapId, { scrollWheelZoom: true }).setView([viewport.center.latitude, viewport.center.longitude], estimatePortfolioMapLevel_(normalized));
    L.tileLayer("https:" + String.fromCharCode(47, 47) + "{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);
    const bounds = [];
    normalized.forEach((point) => {
      const latLng = [point.latitude, point.longitude];
      bounds.push(latLng);
      const marker = L.marker(latLng).addTo(map).bindPopup(escapeHtml_(point.assetName));
      marker.on("click", () => openAssetPanel_(point.assetId, point.assetName));
    });
    if (bounds.length > 1) map.fitBounds(bounds, { padding: [24, 24] });
    window.setTimeout(() => map.invalidateSize(), 250);
    setPortfolioMapStatus_(`임시 동적 지도 · ${normalized.length}개 자산`, "fallback", root);

    return true;
  }).catch((error) => {
    setPortfolioMapDiagnostics_({
      message: "OpenStreetMap fallback failed",

  });
}

function renderDynamicPortfolioMap_(container, points) {
  const normalized = normalizePortfolioMapPoints_(points);
  container.dataset.mapMode = "dynamic";
  container.innerHTML = "";
  container.style.width = "100%";
  container.style.height = "100%";
  const mapNode = document.createElement("div");
  mapNode.className = "naver-dynamic-map-node";
  mapNode.setAttribute("aria-label", "네이버 동적 지도");
  container.appendChild(mapNode);
  const mapSize = getPortfolioMapPixelSize_(container);
  const viewport = buildPortfolioMapViewport_(normalized);
  const map = new naver.maps.Map(mapNode, {
    center: new naver.maps.LatLng(viewport.center.latitude, viewport.center.longitude),
    zoom: estimatePortfolioMapLevel_(normalized),
    size: new naver.maps.Size(mapSize.width, mapSize.height),
    zoomControl: true,
    mapDataControl: false,
    scaleControl: true,
    logoControl: true,
  });
  const bounds = new naver.maps.LatLngBounds();
  normalized.forEach((point) => {
    const position = new naver.maps.LatLng(point.latitude, point.longitude);
    bounds.extend(position);
    const marker = new naver.maps.Marker({
      position,
      map,
      title: point.assetName,
    });
    naver.maps.Event.addListener(marker, "click", () => openAssetPanel_(point.assetId, point.assetName));
  });
  if (normalized.length > 1) map.fitBounds(bounds);
  if (normalized.length === 1) map.setZoom(Math.max(estimatePortfolioMapLevel_(normalized), 13));
  [80, 250, 600, 1200, 2200].forEach((delay) => {
    window.setTimeout(() => resizeAndRefreshNaverMap_(map, container, bounds, normalized), delay);
  });
  return map;
}

function getPortfolioMapPixelSize_(container) {
  const stage = container.closest(".portfolio-map-stage") || container.parentElement;
  const rect = container.getBoundingClientRect();
  const stageRect = stage ? stage.getBoundingClientRect() : { width: 0, height: 0 };
  const width = Math.max(320, Math.round(rect.width || stageRect.width || container.clientWidth || 960));
  const height = Math.max(280, Math.round(rect.height || stageRect.height || container.clientHeight || 420));
  return { width, height };
}

function resizeAndRefreshNaverMap_(map, container, bounds, points) {
  if (!map || !container || !window.naver || !window.naver.maps) return;
  const size = getPortfolioMapPixelSize_(container);
  if (typeof map.setSize === "function") {
    map.setSize(new naver.maps.Size(size.width, size.height));
  }
  if (typeof map.refresh === "function") map.refresh();
  if ((points || []).length > 1 && bounds) map.fitBounds(bounds, { padding: 28 });
}

function mountPortfolioMapPreview_(points, root) {
  const normalized = normalizePortfolioMapPoints_(points);
  const mount = getPortfolioMapMountNodes_(root);
  const container = mount.container;
  if (!container) return;
  const mountToken = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
  container.dataset.mapMountToken = mountToken;
  bindPortfolioMapButtons_(mount.root || container.parentElement || document);
  if (!normalized.length) {
    container.dataset.mapMode = "empty";
    container.innerHTML = renderEmptyState_("좌표 정보가 아직 없습니다.");
    setPortfolioMapStatus_("좌표 정보 없음", "schematic", mount.root);
    setPortfolioMapHelp_("", mount.root);
    return;
  }
  setPortfolioMapStatus_(`네이버 지도 불러오는 중 · ${normalized.length}개 자산`, "", mount.root);
  setPortfolioMapHelp_("", mount.root);
  setPortfolioMapDiagnostics_({ message: "Dynamic Map 우선 로딩 대기 중" }, mount.root);
  const config = getNaverMapConfig_();
  if (config.dynamicClientId) {
    registerNaverMapAuthFailureHandler_(mountToken, mount.root, normalized);
    loadNaverMapsSdk_()
      .then(() => {
        if (container.dataset.mapMountToken !== mountToken) return;
        const mapInstance = renderDynamicPortfolioMap_(container, normalized);
        [350, 900, 1800].forEach((delay) => {
          window.setTimeout(() => resizeAndRefreshNaverMap_(mapInstance, container, null, normalized), delay);
        });
        setPortfolioMapStatus_(`동적 지도 · ${normalized.length}개 자산`, "", mount.root);
        setPortfolioMapHelp_("", mount.root);
        setPortfolioMapDiagnostics_({ message: "Dynamic Map 로딩 성공" }, mount.root);
        window.setTimeout(() => {
          if (container.dataset.mapMode === "auth-failed") return;
          clearNaverMapAuthFailureHandler_(mountToken);
        }, 2000);
      })
      .catch((error) => {
        if (container.dataset.mapMountToken !== mountToken) return;
        const renderedStatic = renderStaticPortfolioMap_(container, normalized);
        if (!renderedStatic) renderSchematicPortfolioMap_(container, normalized);
        setPortfolioMapStatus_(`${renderedStatic ? "정적 지도 대체" : "스케매틱 대체"} · ${normalized.length}개 자산`, renderedStatic ? "fallback" : "schematic", mount.root);
        setPortfolioMapHelp_("네이버 Dynamic Map 로딩에 실패했습니다. 아래 실제 iframe origin과 NCP Web 서비스 URL 등록값을 비교해 주세요.", mount.root);
        setPortfolioMapDiagnostics_({
          message: "Dynamic Map 로딩 실패",
          error: (error && error.message) || String(error || ""),
          sdkUrl: `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${encodeURIComponent(config.dynamicClientId)}&callback=__dashboardNaverMapsSdkReady`,
        }, mount.root);
        clearNaverMapAuthFailureHandler_(mountToken);
      });
    return;
  }
  renderSchematicPortfolioMap_(container, normalized);
  setPortfolioMapStatus_(`스케매틱 대체 · ${normalized.length}개 자산`, "schematic", mount.root);
  setPortfolioMapHelp_("네이버 Dynamic Map Client ID가 없어 임시 개략도를 표시합니다. Script Properties의 NAVER_MAPS_CLIENT_ID를 확인해 주세요.", mount.root);
  setPortfolioMapDiagnostics_({ message: "NAVER_MAPS_CLIENT_ID 미설정" }, mount.root);
}

function hasValue_(value) {
  if (value == null) return false;
  if (typeof value === "number") return Number.isFinite(value);
  if (typeof value === "string") {
    const normalized = value.trim().toLowerCase();
    return normalized !== "" && normalized !== "-" && normalized !== "null" && normalized !== "undefined";
  }
  return true;
}

function numericOrNull_(value) {
  if (value == null || value === "") return null;
  const normalizedValue = typeof value === "string" ? value.replace(/,/g, "").trim() : value;
  if (normalizedValue === "" || normalizedValue === "-") return null;
  const numeric = Number(normalizedValue);
  return Number.isFinite(numeric) ? numeric : null;
}

function roundNumber_(value, digits) {
  const numeric = numericOrNull_(value);
  if (numeric == null) return null;
  const precision = Number.isFinite(Number(digits)) ? Number(digits) : 0;
  const factor = Math.pow(10, precision);
  return Math.round(numeric * factor) / factor;
}

function uniqueValues_(values) {
  return Array.from(new Set((values || []).filter((value) => value != null && value !== "")));
}

function averageBy_(rows, selector) {
  const values = (rows || []).map((row) => typeof selector === "function" ? selector(row) : row && row[selector]);
  const numericValues = values.map((value) => numericOrNull_(value)).filter((value) => value != null);
  if (!numericValues.length) return null;
  return numericValues.reduce((sum, value) => sum + value, 0) / numericValues.length;
}

function firstDefinedNumber_(...values) {
  for (const value of values) {
    const numeric = numericOrNull_(value);
    if (numeric != null) return numeric;
  }
  return null;
}

function firstNonEmptyValue_(...values) {
  for (const value of values) {
    if (hasValue_(value)) return value;
  }
  return null;
}

function firstArrayItemValue_(values) {
  if (!Array.isArray(values)) return null;
  return firstNonEmptyValue_(...values);
}

function buildSpaceLabel_(row) {
  const primary = [row.floorLabel, row.detailAreaLabel].filter(Boolean).join(" / ");
  const secondary = []
    .concat(row.floorLabels || [])
    .concat(row.detailAreaLabels || [])
    .filter(Boolean)
    .join(" / ");
  return firstNonEmptyValue_(primary, secondary, row.spaceLabel, row.areaLabel) || "-";
}

function derivePyValue_(sqmValue, pyValue) {
  const directPy = numericOrNull_(pyValue);
  if (directPy != null) return directPy;
  const sqm = numericOrNull_(sqmValue);
  if (sqm == null || sqm <= 0) return null;
  return sqm / 3.305785;
}

function derivePerPyValue_(amountValue, sqmValue, directValue) {
  const direct = numericOrNull_(directValue);
  if (direct != null) return direct;
  const amount = numericOrNull_(amountValue);
  const sqm = numericOrNull_(sqmValue);
  if (amount == null || sqm == null || sqm <= 0) return null;
  return amount / (sqm / 3.305785);
}

function safeDivideClient_(numerator, denominator) {
  const left = numericOrNull_(numerator);
  const right = numericOrNull_(denominator);
  if (left == null || right == null || right === 0) return null;
  return left / right;
}

function mapByKey_(rows, keyField) {
  return (rows || []).reduce((accumulator, row) => {
    const key = safeGet_(row, [keyField]);
    if (key) accumulator[key] = row;
    return accumulator;
  }, {});
}

function sumNumericValues_(values) {
  let hasNumeric = false;
  let total = 0;
  (values || []).forEach((value) => {
    const numeric = numericOrNull_(value);
    if (numeric == null) return;
    total += numeric;
    hasNumeric = true;
  });
  return hasNumeric ? total : null;
}

function sumRows_(rows, iteratee) {
  return sumNumericValues_((rows || []).map((row, index) => iteratee(row, index)));
}

function resolveCombinedAmount_(totalValue, firstValue, secondValue) {
  const directTotal = numericOrNull_(totalValue);
  if (directTotal != null) return directTotal;
  return sumNumericValues_([firstValue, secondValue]);
}

function deriveMissingComponentAmount_(totalValue, knownValue) {
  const total = numericOrNull_(totalValue);
  const known = numericOrNull_(knownValue);
  if (total == null || known == null) return null;
  return Math.max(total - known, 0);
}

function latestTrendTotal_(rows) {
  for (const row of (rows || []).slice().reverse()) {

}

function denseStripClass_(count) {

}

function resolveCompanyKpiValue_(item, context) {
  if (hasValue_(item && item.value)) return item.value;
  const key = String(safeGet_(item, ["key"]) || "").toLowerCase();
