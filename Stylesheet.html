  html.theme-light,
  body[data-theme="light"],

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: var(--background);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    overflow: hidden;
    font-size: 13px;
    line-height: 1.5;
  }

  body.has-surface-open {
    overflow: hidden;
  }

  body[data-is-admin="true"] {
    --role-rgb: 188, 145, 96;
    --role-soft: rgba(var(--role-rgb), 0.14);
    --role-soft-strong: rgba(var(--role-rgb), 0.24);
    --role-outline: rgba(var(--role-rgb), 0.34);
    --role-ink: #7b5530;
  }

  body[data-is-admin="true"][data-theme-resolved="dark"] {
    --role-soft: rgba(var(--role-rgb), 0.18);
    --role-soft-strong: rgba(var(--role-rgb), 0.28);
    --role-outline: rgba(var(--role-rgb), 0.38);
    --role-ink: #f2d7b4;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
    color: inherit;
  }

  button {
    border: 0;
    padding: 0;
    background: transparent;
    color: inherit;
  }

  input,
  select,
  textarea {
    appearance: none;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  img {
    display: block;
    max-width: 100%;
  }

  ::selection {
    background: rgba(var(--primary-rgb), 0.26);
    color: var(--text-strong);
  }

  :focus-visible {
    outline: none;
    box-shadow: 0 0 0 1px rgba(var(--primary-rgb), 0.34), 0 0 0 4px rgba(var(--primary-rgb), 0.12);
  }

  .material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 320, "GRAD" 0, "opsz" 20;
    font-size: 18px;
    line-height: 1;
  }

  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
    width: 100%;
    height: 100vh;
    overflow: hidden;
    transition: grid-template-columns 180ms ease;
  }

  .app-shell.is-auth-locked {
    display: none;
  }

  .admin-auth-root {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    background:
      radial-gradient(circle at 18% 16%, rgba(var(--secondary-rgb), 0.28), transparent 34%),
      radial-gradient(circle at 82% 14%, rgba(var(--primary-rgb), 0.2), transparent 30%),
      var(--app-bg);
  }

  .admin-auth-root.is-hidden {
    display: none;
  }

  .admin-auth-card {
    width: min(520px, 100%);
    padding: 30px;
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    background: var(--panel-bg-strong);
    box-shadow: var(--panel-shadow);
  }

  .admin-auth-card h1 {
    margin: 12px 0 8px;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.04em;
  }

  .admin-auth-card p {
    margin: 0 0 20px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .admin-auth-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
  }

  .app-shell.is-sidebar-collapsed {
    grid-template-columns: var(--sidebar-collapsed) minmax(0, 1fr);
  }

  .sidebar {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 100vh;
    padding: 16px 14px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--ghost-border);
    box-shadow: 18px 0 44px -34px rgba(15, 23, 42, 0.24);
    backdrop-filter: blur(18px) saturate(120%);
    overflow: hidden;
    z-index: 20;
  }

  .sidebar::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 16% 4%, rgba(var(--primary-rgb), 0.06) 0%, transparent 28%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, transparent 14%);
    pointer-events: none;
  }

  .sidebar > * {
    position: relative;
    z-index: 1;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 46px;
    padding: 4px 6px 10px;
  }

  .sidebar-brand-mark {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    border-radius: 14px;
    background:
      linear-gradient(145deg, rgba(var(--primary-rgb), 0.9) 0%, rgba(var(--primary-rgb), 0.72) 100%),
      var(--surface-lowest);
    color: var(--on-primary);
    font-family: "Manrope", sans-serif;
    font-size: 0.94rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    box-shadow: var(--shadow-glow);
  }

  .sidebar-brand-copy h1 {
    margin: 0;
    font-family: "Manrope", sans-serif;
    font-size: 0.98rem;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text-strong);
  }

  .sidebar-brand-copy p {
    margin: 3px 0 0;
    font-size: 0.66rem;
    line-height: 1.2;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  .sidebar-toggle,
  .nav-item,
  .footer-item,
  .icon-button,
  .primary-button,
  .secondary-button,
  .ghost-button,
  .mobile-menu-button,
  .metric-button,
  .metric-tile-button,
  .summary-button,
  .table-button,
  .stack-chip,
  .ai-chip {
    cursor: pointer;
  }

  .sidebar-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    min-height: 36px;
    padding: 0 11px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--ghost-border);
    background: var(--field-bg);
    color: var(--text-muted);
    transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 0;
    flex: 1;
    overflow-y: auto;
    padding: 2px 4px 4px 0;
  }

  .nav-item,
  .footer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    min-height: 40px;
    padding: 0 12px;
    border-radius: var(--radius-pill);
    color: var(--text-soft);
    text-align: left;
    transition:
      transform 160ms ease,
      color 160ms ease,
      background 160ms ease,
      border-color 160ms ease,
      box-shadow 160ms ease;
  }

  .nav-item .material-symbols-outlined,
  .footer-item .material-symbols-outlined {
    font-size: 18px;
  }

  .nav-item:hover,
  .footer-item:hover,
  .sidebar-toggle:hover {
    color: var(--text-strong);
    background: var(--field-bg-strong);
    border-color: var(--outline);
    transform: translateX(2px);
  }

  .nav-item.is-active {
    color: var(--on-primary);
    background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.92) 0%, rgba(var(--primary-rgb), 0.76) 100%);
    box-shadow: var(--shadow-glow);
    font-weight: 800;
  }

  .nav-item-admin {
    margin-top: 10px;
    position: relative;
  }

  .nav-item-admin::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: -8px;
    height: 1px;
    background: var(--ghost-border);
  }

  body[data-is-admin="true"] .nav-item-admin {
    border: 1px solid var(--role-outline);
    background: var(--role-soft);
    color: var(--role-ink);
  }

  body[data-is-admin="true"] .nav-item-admin.is-active {
    background: linear-gradient(135deg, rgba(var(--role-rgb), 0.9) 0%, rgba(var(--role-rgb), 0.74) 100%);
    color: #2b1b00;
    box-shadow: 0 0 0 1px rgba(var(--role-rgb), 0.16), 0 18px 36px -28px rgba(var(--role-rgb), 0.24);
  }

  .sidebar-footer {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-top: 12px;
    border-top: 1px solid var(--ghost-border);
  }

  .app-shell.is-sidebar-collapsed .sidebar-brand {
    justify-content: center;
    padding-inline: 0;
  }

  .app-shell.is-sidebar-collapsed .sidebar-brand-copy,
  .app-shell.is-sidebar-collapsed .sidebar-toggle-label,
  .app-shell.is-sidebar-collapsed .nav-item span:last-child,
  .app-shell.is-sidebar-collapsed .footer-item span:last-child {
    display: none;
  }

  .app-shell.is-sidebar-collapsed .sidebar {
    padding-left: 10px;
    padding-right: 10px;
  }

  .app-shell.is-sidebar-collapsed .nav-item,
  .app-shell.is-sidebar-collapsed .footer-item,
  .app-shell.is-sidebar-collapsed .sidebar-toggle {
    justify-content: center;
    padding-inline: 0;
  }

  .shell-scrim {
    display: none;
  }

  .workspace {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    min-height: var(--topbar-height);
    padding: 14px 22px;
    border-bottom: 1px solid var(--ghost-border);
    background: var(--topbar-bg);
    backdrop-filter: blur(18px) saturate(130%);
    box-shadow: 0 16px 28px -30px rgba(15, 23, 42, 0.24);
    z-index: 10;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .topbar-brand {
    font-family: "Manrope", sans-serif;
    font-size: 1.04rem;
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text-strong);
  }

  .topbar-caption {
    margin-top: 4px;
    font-size: 0.7rem;
    line-height: 1.3;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .topbar-search-wrap {
    position: relative;
    min-width: min(380px, 36vw);
    flex: 1 1 340px;
    max-width: min(460px, 100%);
  }

  .topbar-search {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-height: 42px;
    padding: 0 14px;
    border-radius: 16px;
    border: 1px solid rgba(var(--primary-rgb), 0.2);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, transparent 100%),
      var(--field-bg);
    color: var(--text-muted);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
    transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
  }

  .topbar-search .material-symbols-outlined {
    font-size: 17px;
    color: var(--text-faint);
  }

  .search-suggestions {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 8px);
    z-index: 1200;
    display: grid;
    gap: 6px;
    width: 100%;
    min-width: 0;
    max-height: min(360px, 60vh);
    overflow-y: auto;
    padding: 10px;
    border-radius: 16px;
    border: 1px solid rgba(var(--primary-rgb), 0.24);
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.16) 0%, rgba(var(--primary-rgb), 0.04) 18%, transparent 36%),
      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    box-shadow: var(--shadow-panel);
    backdrop-filter: blur(18px) saturate(130%);
    box-sizing: border-box;
  }

  .search-suggestions::before {
    content: "";
    position: absolute;
    inset: 0 0 auto;
    height: 1px;
    background: linear-gradient(90deg, rgba(var(--primary-rgb), 0) 0%, rgba(var(--primary-rgb), 0.38) 20%, rgba(var(--primary-rgb), 0.12) 100%);
    pointer-events: none;
  }

  .search-suggestions.is-hidden {
    display: none;
  }

  .search-suggestion {
    display: grid;
    gap: 3px;
    width: 100%;
    padding: 11px 12px;
    border: 1px solid transparent;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0);
    text-align: left;
    color: var(--text);
    transition: background 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
  }

  .field {

    color: var(--text-muted);

  .field select,
  .ai-input {

    min-height: 34px;
    padding: 8px 11px;
    border: 1px solid var(--ghost-border);

      box-shadow 160ms ease;

    transform: translateY(-1px);

  .field-grid {

    min-height: 92px;
    padding: 12px;
    border-radius: 12px;

  .table-button {

    gap: 6px;

    padding: 0 10px;

    border-radius: 16px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px),
      linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px);
    background-size: 56px 56px;
    opacity: 0.65;
    pointer-events: none;
  }

  .portfolio-map-schematic-pin {
    position: absolute;
    transform: translate(-50%, -50%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    min-height: 32px;
    padding: 0 10px;
    border-radius: 999px;
    border: 1px solid rgba(var(--primary-rgb), 0.28);
    background: rgba(255, 255, 255, 0.96);
    color: var(--text-strong);
    font-size: 0.68rem;
    font-weight: 800;
    box-shadow: var(--shadow-soft);
  }

  .map-marker-button:hover {
    transform: translate(-50%, calc(-50% - 1px));
  }

  .map-marker-button:focus-visible {
    outline: 2px solid rgba(var(--primary-rgb), 0.34);
    outline-offset: 2px;
  }

  .chart-shell {
    position: relative;
    width: 100%;
  }

.chart-slot {
    position: relative;
    min-height: 224px;
    height: 224px;
    border-radius: 14px;
    border: 1px solid var(--ghost-border);
    overflow: hidden;
  background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.03) 0%, transparent 18%),
      linear-gradient(180deg, var(--field-bg) 0%, rgba(255, 255, 255, 0) 100%);
}

  .chart-slot::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        to top,
        transparent 0,
        transparent 46px,
        var(--ghost-border) 46px,
        var(--ghost-border) 47px
      );
    pointer-events: none;
    opacity: 0.8;
  }

  .chart-slot.chart-slot-tall {
    min-height: 260px;
    height: 260px;
  }

  .chart-slot canvas {
    position: relative;
    z-index: 1;
    width: 100% !important;
    height: 100% !important;
  }

.chart-placeholder,
.empty-state {
    display: grid;
    place-items: center;
    min-height: 160px;
    padding: 18px;
    border-radius: 12px;
    border: 1px dashed var(--outline);
  background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.03) 0%, transparent 28%),
      var(--field-bg);
    text-align: center;
    font-size: 0.78rem;
    line-height: 1.55;
    color: var(--text-muted);
  }

  .chart-placeholder {
    position: relative;
    z-index: 2;
  }

  .chart-placeholder.is-hidden {
    display: none;
  }

  .is-hidden,
  .icon-button.is-hidden {
    display: none !important;
  }

  .map-list {
    display: grid;
    gap: 8px;
  }

  .primary-button,
  .secondary-button,
  .ghost-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 34px;
    padding: 0 12px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    transition:
      transform 150ms ease,
      box-shadow 150ms ease,
      background 150ms ease,
      color 150ms ease,
      border-color 150ms ease;
  }

  .primary-button {
    background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.92) 0%, rgba(var(--primary-rgb), 0.78) 100%);
    color: var(--on-primary);
    box-shadow: var(--shadow-glow);
  }

  .secondary-button {
    border: 1px solid var(--ghost-border);
    background: var(--field-bg);
    color: var(--text-strong);
  }

  .ghost-button {
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-soft);
  }

  .primary-button:hover,
  .secondary-button:hover,
  .ghost-button:hover {
    transform: translateY(-1px);
  }

  .secondary-button:hover {
    border-color: rgba(var(--primary-rgb), 0.2);
    background: var(--field-bg-strong);
  }

  .secondary-button.is-active {
    border-color: rgba(var(--primary-rgb), 0.28);
    background: rgba(var(--primary-rgb), 0.12);
    color: var(--text-strong);
    box-shadow: inset 0 0 0 1px rgba(var(--primary-rgb), 0.08);
  }

  .ghost-button:hover {
    color: var(--text-strong);
    background: rgba(var(--primary-rgb), 0.08);
  }

  .alert-banner {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 10px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid transparent;
  }

  .alert-banner-info {
    background: rgba(var(--secondary-rgb), 0.08);
    border-color: rgba(var(--secondary-rgb), 0.16);
    color: var(--secondary);
  }

  .alert-banner-error {
    background: var(--danger-soft);
    border-color: rgba(212, 95, 67, 0.18);
    color: var(--danger);
  }

  .alert-banner strong {
    display: block;
    margin-bottom: 2px;
    font-size: 0.8rem;
    color: var(--text-strong);
  }

  .alert-banner p {
    margin: 0;
    font-size: 0.76rem;
    line-height: 1.5;
    color: inherit;
  }

  .state-shell {
    display: grid;
    gap: 10px;
    place-items: center;
    min-height: 280px;
    text-align: center;
  }

  .state-shell strong {
    font-family: "Manrope", sans-serif;
    font-size: 1rem;
    letter-spacing: -0.03em;
    color: var(--text-strong);
  }

  .state-shell p {
    margin: 0;
    font-size: 0.8rem;
    line-height: 1.55;
    color: var(--text-muted);
    max-width: 520px;
  }

  .page-skeleton {
    display: grid;
    gap: 12px;
  }

  .skeleton-block,
  .skeleton-line,
  .skeleton-tile {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    background:
      linear-gradient(
        90deg,
        rgba(var(--primary-rgb), 0.04) 0%,
        rgba(255, 255, 255, 0.08) 18%,
        rgba(var(--primary-rgb), 0.08) 38%,
        rgba(255, 255, 255, 0.04) 58%,
        rgba(var(--primary-rgb), 0.04) 100%
      ),
      var(--field-bg);
    background-size: 220% 100%;
    animation: shimmer 1.4s infinite linear;
  }

  .skeleton-block {
    height: 96px;
  }

  .skeleton-line {
    height: 12px;
  }

  .skeleton-line.short {
    width: 40%;
  }

  .skeleton-line.medium {
    width: 60%;
  }

  .skeleton-line.long {
    width: 88%;
  }

  .skeleton-tile {
    height: 84px;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--overlay-bg);
    backdrop-filter: blur(6px) saturate(120%);
    z-index: 80;
  }

  .loading-overlay.is-visible {
    display: flex;
  }

  .loading-card {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: min(420px, calc(100vw - 48px));
    padding: 18px 20px;
    border-radius: var(--radius-lg);
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 28%),
      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    border: 1px solid var(--outline);
    box-shadow: var(--shadow-panel);
  }

  .loading-copy {
    display: grid;
    gap: 4px;
  }

  .loading-copy strong {
    font-size: 0.84rem;
    color: var(--text-strong);
  }

  .loading-copy span {
    font-size: 0.76rem;
    line-height: 1.5;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 2px solid rgba(var(--primary-rgb), 0.18);
    border-top-color: var(--primary);
    animation: spin 0.8s linear infinite;
  }

  .surface-layer {
    position: fixed;
    inset: 0;
    display: none;
    pointer-events: none;
    z-index: 90;
  }

  .surface-layer.is-open {
    display: block;
    pointer-events: auto;
  }

  .surface-backdrop {
    position: absolute;
    inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(8px) saturate(120%);
    opacity: 0;
    transition: opacity 180ms ease;
  }

  .surface-layer.is-open .surface-backdrop {
    opacity: 1;
  }

  .modal-host,
  .detail-panel-host {
    position: absolute;
    top: 0;
    bottom: 0;
    opacity: 0;
    transition: transform 180ms ease, opacity 180ms ease;
  }

  .modal-host {
    display: flex;
    align-items: center;
    justify-content: center;
    left: 0;
    right: 0;
    width: auto;
    padding: 24px;
    transform: translateY(24px);
  }

  .modal {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-panel-host {
    right: 0;
    width: min(var(--panel-width), calc(100vw - 16px));
    transform: translateX(100%);
  }

  .surface-layer.is-modal-open .modal-host {
    opacity: 1;
    transform: translateY(0);
  }

  .surface-layer.is-panel-open .detail-panel-host {
    opacity: 1;
    transform: translateX(0);
  }

  .surface-frame {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: min(var(--modal-width), 100%);
    max-height: calc(100vh - 48px);
    margin: 0 auto;
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 18%),
      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    border: 1px solid rgba(var(--primary-rgb), 0.28);
    box-shadow: var(--shadow-panel);
    overflow: hidden;
    backdrop-filter: blur(10px) saturate(112%);
  }

  .modal-card {
    border-radius: 18px;
    background: var(--panel-bg);
    border: 1px solid rgba(var(--primary-rgb), 0.24);
    box-shadow: var(--shadow-panel);
  }

  .surface-frame-wide {
    max-width: min(1280px, 100%);
  }

  .surface-frame-entity {
    max-width: min(1320px, 100%);
  }

  .surface-frame-wide td,
  .surface-frame-wide th {
    white-space: nowrap;
  }

  .surface-head,
  .surface-foot {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px;
    background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
    border-bottom: 1px solid var(--ghost-border);
  }

  .surface-foot {
    align-items: center;
    justify-content: flex-end;
    border-top: 1px solid var(--ghost-border);
    border-bottom: 0;
  }

  .surface-head-copy {
    min-width: 0;
  }

  .surface-title {
    margin: 0;
    font-family: "Manrope", sans-serif;
    font-size: 1.08rem;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text-strong);
  }

  .surface-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px 18px 20px;
    display: grid;
    gap: 12px;
    background:
      radial-gradient(circle at top right, rgba(var(--secondary-rgb), 0.08) 0%, transparent 22%),
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.03) 0%, transparent 16%);
  }

  .key-value-grid {
    display: grid;
    gap: 8px;
  }

  .key-value-item {
    display: grid;
    gap: 4px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid var(--ghost-border);
    background: var(--field-bg);
  }

  .key-value-item span {
    font-size: 0.64rem;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 800;
  }

  .stack-floor-track {
    min-width: 0;
  }

  .key-value-item strong {
    font-size: 0.8rem;
    line-height: 1.45;
    color: var(--text-strong);
    font-weight: 700;
  }

  .ai-fab {
    position: fixed;
    right: 22px;
    bottom: 22px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 42px;
    padding: 0 15px;
    border-radius: var(--radius-pill);
    background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.92) 0%, rgba(var(--primary-rgb), 0.78) 100%);
    color: var(--on-primary);
    box-shadow: var(--shadow-glow);
    z-index: 50;
    transition: transform 160ms ease, box-shadow 160ms ease;
  }

  .ai-fab:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 0 1px rgba(var(--primary-rgb), 0.16), 0 22px 46px -30px rgba(var(--primary-rgb), 0.26);
  }

  .ai-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: min(392px, calc(100vw - 16px));
    height: 100vh;
    display: flex;
    flex-direction: column;
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 18%),
      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    border-left: 1px solid var(--outline);
    box-shadow: var(--shadow-panel);
    transform: translateX(100%);
    transition: transform 180ms ease;
    z-index: 70;
    backdrop-filter: blur(18px) saturate(130%);
  }

  .ai-panel.is-open {
    transform: translateX(0);
  }

  .ai-panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--ghost-border);
  }

  .ai-panel-title {
    margin: 0;
    font-family: "Manrope", sans-serif;
    font-size: 1.02rem;
    line-height: 1.08;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text-strong);
  }

  .ai-panel-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px;
    display: grid;
    gap: 12px;
  }

  .ai-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .ai-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    padding: 0 10px;
    border-radius: var(--radius-pill);
    border: 1px solid rgba(var(--primary-rgb), 0.16);
    background: rgba(var(--primary-rgb), 0.08);
    color: var(--accent-ink);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
  }

  .ai-chip:hover {
    transform: translateY(-1px);
    background: rgba(var(--primary-rgb), 0.12);
    border-color: rgba(var(--primary-rgb), 0.24);
  }

  .page-note {
    padding: 10px 12px;
    border-radius: 11px;
    background: var(--field-bg);
    border: 1px solid var(--ghost-border);
    font-size: 0.74rem;
    line-height: 1.5;
    color: var(--text-muted);
  }

  .inline-muted {
    color: var(--text-muted);
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  ::-webkit-scrollbar-thumb {
    border-radius: 999px;
    border: 2px solid transparent;
    background: rgba(122, 136, 154, 0.38);
    background-clip: padding-box;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  @keyframes shimmer {
    0% {
      background-position: 200% 0;
    }

    100% {
      background-position: -200% 0;
    }
  }

  @keyframes spin {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(360deg);
    }
  }

  @media (max-width: 1480px) {
    .workbench-shell-tools {
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .workbench-shell-playground {
      grid-template-columns: 240px minmax(0, 1fr);
    }

    .workbench-shell-tools-refined {
      grid-template-columns: 280px minmax(0, 1fr);
    }

    .workbench-shell-playground-refined {
      grid-template-columns: 248px minmax(0, 1fr);
    }
  }

  @media (max-width: 1280px) {
    .dense-strip,
    .stat-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .content-grid-main,
    .asset-focus-grid,
    .asset-detail-grid,
    .content-grid-two,
    .content-grid-three,
    .portfolio-map-preview,
    .workbench-shell-tools,
    .workbench-shell-playground,
    .workbench-shell-tools-refined,
    .workbench-shell-playground-refined,
    .advanced-sector-workbench,
    .advanced-tools-workbench,
    .advanced-playground-workbench,
    .company-analysis-grid,
    .company-intel-grid,
    .query-builder-grid,
    .field-grid {
      grid-template-columns: 1fr;
    }

    .company-kpi-strip,
    .company-basis-strip {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .portfolio-asset-grid,
    .portfolio-map-inline-grid,
    .company-asset-grid,
    .asset-summary-grid,
    .playground-pivot-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .home-portfolio-asset-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .page-meta {
      justify-content: flex-start;
    }

    .topbar-utility {
      justify-items: start;
      margin-left: 0;
    }

    .topbar-status-lane,
    .topbar-action-lane,
    .page-head-utility {
      justify-content: flex-start;
    }
  }

  @media (max-width: 960px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: min(var(--sidebar-width), calc(100vw - 28px));
      transform: translateX(-100%);
      transition: transform 180ms ease;
      box-shadow: var(--shadow-panel);
    }

    .sidebar.is-open {
      transform: translateX(0);
    }

    .shell-scrim.is-open {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(6, 9, 11, 0.34);
      backdrop-filter: blur(4px);
      z-index: 15;
    }

    .mobile-menu-button {
      display: inline-flex;
    }

    .topbar-search {
      display: none;
    }

    .tab-panel-development-overlay {
      padding: 16px;
      border-radius: 18px;
    }

    .tab-panel-development-card {
      padding: 18px 18px 20px;
      border-radius: 18px;
    }

    .canvas {
      padding: 16px 14px 26px;
    }

    .topbar {
      padding: 12px 14px;
    }

    .page-head,
    .topbar,
    .hero-head,
    .toolbar-row {
      align-items: flex-start;
    }

    .view-mode-card {
      width: 100%;
    }

    .dense-strip,
    .dense-strip-4,
    .dense-strip-3,
    .advanced-kpi-strip,
    .stat-grid,
    .insight-grid {
      grid-template-columns: 1fr;
    }

    .advanced-rail-wide {
      position: static;
    }

    .company-kpi-strip,
    .company-basis-strip,
    .company-analysis-grid,
    .company-intel-grid {
      grid-template-columns: 1fr;
    }

    .portfolio-asset-grid,
    .portfolio-map-inline-grid,
    .company-asset-grid,
    .asset-summary-grid,
    .playground-pivot-grid {
      grid-template-columns: 1fr;
    }

    .home-portfolio-asset-grid,
    .home-expiry-list {
      grid-template-columns: 1fr;
    }

    .portfolio-map-sidebar,
    .portfolio-map-stage {
      min-height: 340px;
    }

    .modal-host {
      padding: 12px 8px;
    }

    .detail-panel-host {
      width: calc(100vw - 8px);
    }
  }

  @media (max-width: 720px) {
    .page-title {
      font-size: 1.9rem;
    }

    .surface-frame {
      border-radius: 18px;
    }

    .ai-fab span:last-child {
      display: none;
    }

    .loading-card {
      min-width: calc(100vw - 28px);
      padding: 16px;
    }

    .key-value-grid {
      grid-template-columns: 1fr !important;
    }
  }

  /* Weekly operations rebuild: dense ledger-first layout */
  .weekly-report-page {
    gap: 10px;
  }

  .weekly-report-page .hero-subtitle,
  .weekly-report-page .section-subtitle {
    margin-top: 4px;
    font-size: 0.82rem;
    line-height: 1.35;
  }

  .weekly-report-page .workspace-panel,
  .weekly-report-page .hero-panel {
    padding: 14px 16px !important;
    border-radius: 14px;
    box-shadow: 0 12px 28px rgba(10, 35, 26, 0.08);
  }

  .weekly-kpi-strip {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
    margin-top: 12px;
  }

  .weekly-kpi-button {
    display: grid;
    gap: 5px;
    min-height: 72px;
    width: 100%;
    padding: 9px 11px;
    border: 1.5px solid rgba(var(--primary-rgb), 0.34);
    border-radius: 11px;
    background: linear-gradient(180deg, var(--surface-1) 0%, color-mix(in srgb, var(--surface-1) 86%, var(--accent-soft)) 100%);
    color: var(--text-body);
    text-align: left;
    cursor: pointer;
  }

  .weekly-kpi-button:hover,
  .weekly-kpi-button:focus-visible {
    border-color: rgba(var(--primary-rgb), 0.72);
    box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12);
    outline: none;
  }

  .weekly-kpi-static {
    cursor: default;
  }

  .weekly-kpi-static:hover,
  .weekly-kpi-static:focus-visible {
    border-color: rgba(var(--primary-rgb), 0.34);
    box-shadow: none;
  }

  .weekly-kpi-button span,
  .weekly-kpi-button em {
    color: var(--text-muted);
    font-size: 0.7rem;
    font-style: normal;
