  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at 0% 0%, rgba(var(--primary-rgb), 0.05) 0%, transparent 24%),
      radial-gradient(circle at 100% 0%, rgba(var(--secondary-rgb), 0.04) 0%, transparent 22%),
      linear-gradient(180deg, var(--background-top) 0%, var(--background) 24%, var(--surface-canvas) 100%);
    color: var(--text);
    font-family: "Inter", sans-serif;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    overflow: hidden;
    font-size: 13px;
    line-height: 1.5;
  }

  body.has-surface-open {
    overflow: hidden;
  }

  body[data-is-admin="true"] {
    --role-rgb: 188, 145, 96;
    --role-soft: rgba(var(--role-rgb), 0.14);
    --role-soft-strong: rgba(var(--role-rgb), 0.24);
    --role-outline: rgba(var(--role-rgb), 0.34);
    --role-ink: #7b5530;
  }

  body[data-is-admin="true"][data-theme-resolved="dark"] {
    --role-soft: rgba(var(--role-rgb), 0.18);
    --role-soft-strong: rgba(var(--role-rgb), 0.28);
    --role-outline: rgba(var(--role-rgb), 0.38);
    --role-ink: #f2d7b4;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
    color: inherit;
  }

  button {
    border: 0;
    padding: 0;
    background: transparent;
    color: inherit;
  }

  input,
  select,
  textarea {
    appearance: none;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  img {
    display: block;
    max-width: 100%;
  }

  ::selection {
    background: rgba(var(--primary-rgb), 0.26);
    color: var(--text-strong);
  }

  :focus-visible {
    outline: none;
    box-shadow: 0 0 0 1px rgba(var(--primary-rgb), 0.34), 0 0 0 4px rgba(var(--primary-rgb), 0.12);
  }

  .material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 320, "GRAD" 0, "opsz" 20;
    font-size: 18px;
    line-height: 1;
  }

  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
    width: 100%;
    height: 100vh;
    overflow: hidden;
    transition: grid-template-columns 180ms ease;
  }

  .app-shell.is-auth-locked {
    display: none;
  }

  .admin-auth-root {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    background:
      radial-gradient(circle at 18% 16%, rgba(var(--secondary-rgb), 0.28), transparent 34%),
      radial-gradient(circle at 82% 14%, rgba(var(--primary-rgb), 0.2), transparent 30%),
      var(--app-bg);
  }

  .admin-auth-root.is-hidden {
    display: none;
  }

  .admin-auth-card {
    width: min(520px, 100%);
    padding: 30px;
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    background: var(--panel-bg-strong);
    box-shadow: var(--panel-shadow);
  }

  .admin-auth-card h1 {
    margin: 12px 0 8px;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.04em;
  }

  .admin-auth-card p {
    margin: 0 0 20px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .admin-auth-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
  }

  .app-shell.is-sidebar-collapsed {
    grid-template-columns: var(--sidebar-collapsed) minmax(0, 1fr);
  }

  .sidebar {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 100vh;
    padding: 16px 14px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--ghost-border);
    box-shadow: 18px 0 44px -34px rgba(15, 23, 42, 0.24);
    backdrop-filter: blur(18px) saturate(120%);
    overflow: hidden;
    z-index: 20;
  }

  .sidebar::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 16% 4%, rgba(var(--primary-rgb), 0.06) 0%, transparent 28%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, transparent 14%);
    pointer-events: none;
  }

  .sidebar > * {
    position: relative;
    z-index: 1;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 46px;
    padding: 4px 6px 10px;
  }

  .sidebar-brand-mark {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    border-radius: 14px;
    background:
      linear-gradient(145deg, rgba(var(--primary-rgb), 0.9) 0%, rgba(var(--primary-rgb), 0.72) 100%),
      var(--surface-lowest);
    color: var(--on-primary);
    font-family: "Manrope", sans-serif;
    font-size: 0.94rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    box-shadow: var(--shadow-glow);
  }

  .sidebar-brand-copy h1 {
    margin: 0;
    font-family: "Manrope", sans-serif;
    font-size: 0.98rem;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text-strong);
  }

  .sidebar-brand-copy p {
    margin: 3px 0 0;
    font-size: 0.66rem;
    line-height: 1.2;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  .sidebar-toggle,
  .nav-item,
  .footer-item,
  .icon-button,
  .primary-button,
  .secondary-button,
  .ghost-button,
  .mobile-menu-button,
  .metric-button,
  .metric-tile-button,
  .summary-button,
  .table-button,
  .stack-chip,
  .ai-chip {
    cursor: pointer;
  }

  .sidebar-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    min-height: 36px;
    padding: 0 11px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--ghost-border);
    background: var(--field-bg);
    color: var(--text-muted);
    transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 0;
    flex: 1;
    overflow-y: auto;
    padding: 2px 4px 4px 0;
  }

  .nav-item,
  .footer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    min-height: 40px;
    padding: 0 12px;
    border-radius: var(--radius-pill);
    color: var(--text-soft);
    text-align: left;
    transition:
      transform 160ms ease,
      color 160ms ease,
      background 160ms ease,
      border-color 160ms ease,
      box-shadow 160ms ease;
  }

  .nav-item .material-symbols-outlined,
  .footer-item .material-symbols-outlined {
    font-size: 18px;
  }

  .nav-item:hover,
  .footer-item:hover,
  .sidebar-toggle:hover {
    color: var(--text-strong);
    background: var(--field-bg-strong);
    border-color: var(--outline);
    transform: translateX(2px);
  }

  .nav-item.is-active {
    color: var(--on-primary);
    background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.92) 0%, rgba(var(--primary-rgb), 0.76) 100%);
    box-shadow: var(--shadow-glow);
    font-weight: 800;
  }

  .nav-item-admin {
    margin-top: 10px;
    position: relative;
  }

  .nav-item-admin::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: -8px;
    height: 1px;
    background: var(--ghost-border);
  }

  body[data-is-admin="true"] .nav-item-admin {
    border: 1px solid var(--role-outline);
    background: var(--role-soft);
    color: var(--role-ink);
  }

  body[data-is-admin="true"] .nav-item-admin.is-active {
    background: linear-gradient(135deg, rgba(var(--role-rgb), 0.9) 0%, rgba(var(--role-rgb), 0.74) 100%);
    color: #2b1b00;
    box-shadow: 0 0 0 1px rgba(var(--role-rgb), 0.16), 0 18px 36px -28px rgba(var(--role-rgb), 0.24);
  }

  .sidebar-footer {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding-top: 12px;
    border-top: 1px solid var(--ghost-border);
  }

  .app-shell.is-sidebar-collapsed .sidebar-brand {
    justify-content: center;
    padding-inline: 0;
  }

  .app-shell.is-sidebar-collapsed .sidebar-brand-copy,
  .app-shell.is-sidebar-collapsed .sidebar-toggle-label,
  .app-shell.is-sidebar-collapsed .nav-item span:last-child,
  .app-shell.is-sidebar-collapsed .footer-item span:last-child {
    display: none;
  }

  .app-shell.is-sidebar-collapsed .sidebar {
    padding-left: 10px;
    padding-right: 10px;
  }

  .app-shell.is-sidebar-collapsed .nav-item,
  .app-shell.is-sidebar-collapsed .footer-item,
  .app-shell.is-sidebar-collapsed .sidebar-toggle {
    justify-content: center;
    padding-inline: 0;
  }

  .shell-scrim {
    display: none;
  }

  .workspace {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    min-height: var(--topbar-height);
    padding: 14px 22px;
    border-bottom: 1px solid var(--ghost-border);
    background: var(--topbar-bg);
    backdrop-filter: blur(18px) saturate(130%);
    box-shadow: 0 16px 28px -30px rgba(15, 23, 42, 0.24);
    z-index: 10;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .topbar-brand {
    font-family: "Manrope", sans-serif;
    font-size: 1.04rem;
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--text-strong);
  }

  .topbar-caption {
    margin-top: 4px;
    font-size: 0.7rem;
    line-height: 1.3;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .topbar-search-wrap {
    position: relative;
    min-width: min(380px, 36vw);
    flex: 1 1 340px;
    max-width: min(460px, 100%);
  }

  .topbar-search {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-height: 42px;
    padding: 0 14px;
    border-radius: 16px;
    border: 1px solid rgba(var(--primary-rgb), 0.2);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, transparent 100%),
      var(--field-bg);
    color: var(--text-muted);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);

  .field {

    gap: 6px;

    width: 100%;
    min-height: 34px;
    padding: 8px 11px;

    background: var(--field-bg);

    font-size: 1rem;
    line-height: 1;
    font-weight: 800;
    letter-spacing: -0.03em;

    letter-spacing: 0.08em;

    border-bottom: 1px solid rgba(var(--primary-rgb), 0.2);

  td {

    vertical-align: top;
    color: var(--text-soft);

  tbody tr:last-child td {

  tbody tr td:first-child {

  }

  tbody tr.is-clickable:hover td {

  }

  .table-button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    padding: 0 10px;
    border-radius: var(--radius-pill);
    border: 1px solid rgba(var(--primary-rgb), 0.16);
    background: rgba(var(--primary-rgb), 0.08);
    color: var(--accent-ink);
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
  }

  .table-button:hover {
    transform: translateY(-1px);
    background: rgba(var(--primary-rgb), 0.12);
    border-color: rgba(var(--primary-rgb), 0.24);
  }

  .stack-grid {

    gap: 0;
    border: 1px solid var(--ghost-border);

  }

    border-radius: 0;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.05) 0%, transparent 48%),
      linear-gradient(180deg, var(--surface-lowest) 0%, var(--field-bg) 100%);
    border-bottom: 1px solid rgba(var(--primary-rgb), 0.08);

  .stack-floor-gutter {
    display: flex;
    align-items: stretch;
    justify-content: center;
    background:
      linear-gradient(180deg, rgba(var(--secondary-rgb), 0.18) 0%, rgba(var(--primary-rgb), 0.1) 100%);
    border-right: 1px solid rgba(var(--primary-rgb), 0.12);
  }

  .stack-floor-label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    font-size: 0.68rem;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent-ink);
    font-weight: 800;
    background:
      linear-gradient(180deg, rgba(var(--secondary-rgb), 0.16) 0%, rgba(var(--primary-rgb), 0.1) 100%);
    border-right: 1px solid rgba(var(--primary-rgb), 0.12);
    box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.22);
  }

  .stack-track {

  }

  .stack-chip {
    min-width: 0;

    border: 1px solid rgba(var(--primary-rgb), 0.22);
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.16) 0%, transparent 26%),
      linear-gradient(180deg, var(--field-bg-strong) 0%, var(--field-bg) 100%);
    color: var(--text-strong);

    line-height: 1.45;
    text-align: left;
    box-shadow: 0 8px 16px -14px rgba(18, 37, 52, 0.3);

  }

  .stack-chip:hover {
    transform: translateY(-1px);
    border-color: rgba(var(--primary-rgb), 0.28);
    box-shadow: var(--shadow-soft);
  }

  .stack-chip.is-review {
    border-color: rgba(212, 95, 67, 0.22);
    background:
      linear-gradient(180deg, rgba(212, 95, 67, 0.14) 0%, transparent 28%),
      linear-gradient(180deg, var(--field-bg-strong) 0%, var(--field-bg) 100%);
    color: var(--danger);
  }

  .portfolio-map-preview {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    align-items: stretch;
  }

  .portfolio-map-stage {

      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    box-shadow: var(--shadow-soft);
  }

  .portfolio-map-canvas {
    position: absolute;
    inset: 0;
    overflow: hidden;
    min-height: 280px;
  }

  .naver-dynamic-map-node {

    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 280px;
  }

  .portfolio-map-canvas[data-map-mode="dynamic"] {
    background: #dfe9f2;
  }

  .portfolio-map-canvas[data-map-mode="static"],
  .portfolio-map-canvas[data-map-mode="schematic"] {
    padding: 0;
  }

  .portfolio-map-static-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .portfolio-map-status {
    position: absolute;
    left: 14px;
    top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 32px;
    padding: 0 12px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--outline);
    background: rgba(255, 255, 255, 0.86);
    color: var(--text-strong);
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.03em;
    box-shadow: var(--shadow-soft);
    z-index: 2;
    backdrop-filter: blur(10px);
  }

  .portfolio-map-status::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--primary);
    box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.16);
  }

  .portfolio-map-status.is-fallback::before {
    background: var(--secondary);
    box-shadow: 0 0 0 4px rgba(var(--secondary-rgb), 0.16);
  }

  .portfolio-map-status.is-schematic::before {
    background: var(--warn);
    box-shadow: 0 0 0 4px rgba(255, 191, 94, 0.18);
  }

  .portfolio-map-inline-grid,
  .portfolio-asset-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .company-asset-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .portfolio-map-list-button {
    display: grid;
    gap: 4px;
    width: 100%;
    padding: 12px 13px;
    text-align: left;
    border-radius: 14px;
    border: 1px solid var(--ghost-border);
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 28%),
      var(--field-bg-strong);
    transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
  }

  .portfolio-map-list-button:hover {
    transform: translateY(-1px);
    border-color: rgba(var(--primary-rgb), 0.26);
    box-shadow: var(--shadow-soft);
  }

  .portfolio-map-list-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.79rem;
    font-weight: 800;
    color: var(--text-strong);
  }

  .portfolio-map-list-index {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: rgba(var(--primary-rgb), 0.14);
    color: var(--accent-ink);
    font-size: 0.69rem;
    font-weight: 800;
    flex-shrink: 0;
  }

  .portfolio-map-list-meta {
    display: none;
  }

  .portfolio-map-help {
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(var(--primary-rgb), 0.16);
    background:
      linear-gradient(180deg, rgba(var(--secondary-rgb), 0.14) 0%, rgba(var(--primary-rgb), 0.05) 100%),
      var(--field-bg);
    color: var(--text-soft);
    font-size: 0.76rem;
    line-height: 1.5;
  }

  .portfolio-map-diagnostics {
    padding: 12px;
    border-radius: 14px;
    border: 1px dashed rgba(var(--secondary-rgb), 0.32);
    background:
      linear-gradient(180deg, rgba(var(--secondary-rgb), 0.1) 0%, rgba(var(--primary-rgb), 0.04) 100%),
      var(--field-bg);
  }

  .portfolio-map-diagnostics .key-value-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }

  .portfolio-map-diagnostics-title {
    margin-bottom: 8px;
    color: var(--text-strong);
    font-size: 0.78rem;
    font-weight: 800;
  }

  .portfolio-map-diagnostics-note {
    margin: 8px 0 0;
    color: var(--text-soft);
    font-size: 0.74rem;
    line-height: 1.5;
  }

  .portfolio-asset-block,
  .asset-name-chip {
    min-width: 0;
    min-height: 52px;
    padding: 12px 12px;
    border-radius: 14px;
    border: 1px solid rgba(var(--primary-rgb), 0.16);
    background:
      linear-gradient(180deg, rgba(var(--secondary-rgb), 0.18) 0%, rgba(var(--primary-rgb), 0.08) 100%),
      linear-gradient(180deg, var(--field-bg-strong) 0%, var(--field-bg) 100%);
    color: var(--text-strong);
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.35;
    text-align: left;
    box-shadow: 0 10px 18px -16px rgba(18, 37, 52, 0.28);
    transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
  }

  .portfolio-asset-block:hover,
  .asset-name-chip:hover,
  .portfolio-map-list-button:hover {
    transform: translateY(-1px);
    border-color: rgba(var(--primary-rgb), 0.28);
    background:
      linear-gradient(180deg, rgba(var(--secondary-rgb), 0.24) 0%, rgba(var(--primary-rgb), 0.1) 100%),
      linear-gradient(180deg, var(--field-bg-strong) 0%, var(--field-bg) 100%);
  }

  .portfolio-map-schematic {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 18px;
    background:
      radial-gradient(circle at 18% 18%, rgba(var(--primary-rgb), 0.1) 0%, transparent 24%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, transparent 100%),
      linear-gradient(180deg, #d8e2ec 0%, #c8d4df 100%);
  }

  .portfolio-map-schematic::before {
    content: "";
    position: absolute;
    inset: 18px;
    border-radius: 16px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px),
      linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px);
    background-size: 56px 56px;
    opacity: 0.65;
    pointer-events: none;
  }

  .portfolio-map-schematic-pin {
    position: absolute;
    transform: translate(-50%, -50%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    min-height: 32px;
    padding: 0 10px;
    border-radius: 999px;
    border: 1px solid rgba(var(--primary-rgb), 0.28);
    background: rgba(255, 255, 255, 0.96);
    color: var(--text-strong);
    font-size: 0.68rem;
    font-weight: 800;
    box-shadow: var(--shadow-soft);
  }

  .map-marker-button:hover {
    transform: translate(-50%, calc(-50% - 1px));
  }

  .map-marker-button:focus-visible {
    outline: 2px solid rgba(var(--primary-rgb), 0.34);
    outline-offset: 2px;
  }

  .chart-shell {
    position: relative;
    width: 100%;
  }

.chart-slot {
    position: relative;
    min-height: 224px;
    height: 224px;
    border-radius: 14px;
    border: 1px solid var(--ghost-border);
    overflow: hidden;
  background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.03) 0%, transparent 18%),
      linear-gradient(180deg, var(--field-bg) 0%, rgba(255, 255, 255, 0) 100%);
}

  .chart-slot::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        to top,
        transparent 0,
        transparent 46px,
        var(--ghost-border) 46px,
        var(--ghost-border) 47px
      );
    pointer-events: none;
    opacity: 0.8;
  }

  .chart-slot.chart-slot-tall {
    min-height: 260px;
    height: 260px;
  }

  .chart-slot canvas {
    position: relative;
    z-index: 1;
    width: 100% !important;
    height: 100% !important;
  }

.chart-placeholder,
.empty-state {
    display: grid;
    place-items: center;
    min-height: 160px;
    padding: 18px;
    border-radius: 12px;
    border: 1px dashed var(--outline);
  background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.03) 0%, transparent 28%),
      var(--field-bg);
    text-align: center;
    font-size: 0.78rem;
    line-height: 1.55;
    color: var(--text-muted);
  }

  .chart-placeholder {
    position: relative;
    z-index: 2;
  }

  .chart-placeholder.is-hidden {
    display: none;
  }

  .is-hidden,
  .icon-button.is-hidden {
    display: none !important;
  }

  .map-list {
    display: grid;
    gap: 8px;
  }

  .primary-button,
  .secondary-button,
  .ghost-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 34px;
    padding: 0 12px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    transition:
      transform 150ms ease,
      box-shadow 150ms ease,
      background 150ms ease,
      color 150ms ease,
      border-color 150ms ease;
  }

  .primary-button {
    background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.92) 0%, rgba(var(--primary-rgb), 0.78) 100%);
    color: var(--on-primary);
    box-shadow: var(--shadow-glow);
  }

  .secondary-button {
    border: 1px solid var(--ghost-border);
    background: var(--field-bg);
    color: var(--text-strong);
  }

  .ghost-button {
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-soft);
  }

  .primary-button:hover,
  .secondary-button:hover,
  .ghost-button:hover {
    transform: translateY(-1px);
  }

  .secondary-button:hover {
    border-color: rgba(var(--primary-rgb), 0.2);
    background: var(--field-bg-strong);
  }

  .secondary-button.is-active {
    border-color: rgba(var(--primary-rgb), 0.28);
    background: rgba(var(--primary-rgb), 0.12);
    color: var(--text-strong);
    box-shadow: inset 0 0 0 1px rgba(var(--primary-rgb), 0.08);
  }

  .ghost-button:hover {
    color: var(--text-strong);
    background: rgba(var(--primary-rgb), 0.08);
  }

  .alert-banner {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 10px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid transparent;
  }

  .alert-banner-info {
    background: rgba(var(--secondary-rgb), 0.08);
    border-color: rgba(var(--secondary-rgb), 0.16);
    color: var(--secondary);
  }

  .alert-banner-error {
    background: var(--danger-soft);
    border-color: rgba(212, 95, 67, 0.18);
    color: var(--danger);
  }

  .alert-banner strong {
    display: block;
    margin-bottom: 2px;
    font-size: 0.8rem;
    color: var(--text-strong);
  }

  .alert-banner p {
    margin: 0;
    font-size: 0.76rem;
    line-height: 1.5;
    color: inherit;
  }

  .state-shell {
    display: grid;
    gap: 10px;
    place-items: center;
    min-height: 280px;
    text-align: center;
  }

  .state-shell strong {
    font-family: "Manrope", sans-serif;
    font-size: 1rem;
    letter-spacing: -0.03em;
    color: var(--text-strong);
  }

  .state-shell p {
    margin: 0;
    font-size: 0.8rem;
    line-height: 1.55;
    color: var(--text-muted);
    max-width: 520px;
  }

  .page-skeleton {
    display: grid;
    gap: 12px;
  }

  .skeleton-block,
  .skeleton-line,
  .skeleton-tile {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    background:
      linear-gradient(
        90deg,
        rgba(var(--primary-rgb), 0.04) 0%,
        rgba(255, 255, 255, 0.08) 18%,
        rgba(var(--primary-rgb), 0.08) 38%,
        rgba(255, 255, 255, 0.04) 58%,
        rgba(var(--primary-rgb), 0.04) 100%
      ),
      var(--field-bg);
    background-size: 220% 100%;
    animation: shimmer 1.4s infinite linear;
  }

  .skeleton-block {
    height: 96px;
  }

  .skeleton-line {
    height: 12px;
  }

  .skeleton-line.short {
    width: 40%;
  }

  .skeleton-line.medium {
    width: 60%;
  }

  .skeleton-line.long {
    width: 88%;
  }

  .skeleton-tile {
    height: 84px;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--overlay-bg);
    backdrop-filter: blur(6px) saturate(120%);
    z-index: 80;
  }

  .loading-overlay.is-visible {
    display: flex;
  }

  .loading-card {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: min(420px, calc(100vw - 48px));
    padding: 18px 20px;
    border-radius: var(--radius-lg);
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 28%),
      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    border: 1px solid var(--outline);
    box-shadow: var(--shadow-panel);
  }

  .loading-copy {
    display: grid;
    gap: 4px;
  }

  .loading-copy strong {
    font-size: 0.84rem;
    color: var(--text-strong);
  }

  .loading-copy span {
    font-size: 0.76rem;
    line-height: 1.5;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 2px solid rgba(var(--primary-rgb), 0.18);
    border-top-color: var(--primary);
    animation: spin 0.8s linear infinite;
  }

  .surface-layer {
    position: fixed;
    inset: 0;
    display: none;
    pointer-events: none;
    z-index: 90;
  }

  .surface-layer.is-open {
    display: block;
    pointer-events: auto;
  }

  .surface-backdrop {
    position: absolute;
    inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(8px) saturate(120%);
    opacity: 0;
    transition: opacity 180ms ease;
  }

  .surface-layer.is-open .surface-backdrop {
    opacity: 1;
  }

  .modal-host,
  .detail-panel-host {
    position: absolute;
    top: 0;
    bottom: 0;
    opacity: 0;
    transition: transform 180ms ease, opacity 180ms ease;
  }

  .modal-host {
    display: flex;
    align-items: center;
    justify-content: center;
    left: 0;
    right: 0;
    width: auto;
    padding: 24px;
    transform: translateY(24px);
  }

  .modal {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-panel-host {
    right: 0;
    width: min(var(--panel-width), calc(100vw - 16px));
    transform: translateX(100%);
  }

  .surface-layer.is-modal-open .modal-host {
    opacity: 1;
    transform: translateY(0);
  }

  .surface-layer.is-panel-open .detail-panel-host {
    opacity: 1;
    transform: translateX(0);
  }

  .surface-frame {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: min(var(--modal-width), 100%);
    max-height: calc(100vh - 48px);
    margin: 0 auto;
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, transparent 18%),
      linear-gradient(180deg, var(--panel-bg-strong) 0%, var(--panel-bg) 100%);
    border: 1px solid rgba(var(--primary-rgb), 0.28);
    box-shadow: var(--shadow-panel);
    overflow: hidden;
    backdrop-filter: blur(10px) saturate(112%);
  }

  .modal-card {
    border-radius: 18px;
    background: var(--panel-bg);
    border: 1px solid rgba(var(--primary-rgb), 0.24);
    box-shadow: var(--shadow-panel);
  }

  .surface-frame-wide {
    max-width: min(1280px, 100%);
  }

  .surface-frame-entity {
    max-width: min(1320px, 100%);
  }

  .surface-frame-wide td,
  .surface-frame-wide th {
    white-space: nowrap;
